 ### EVENTS ###
 
 anatolia_intro.1.title:0 "From the Ashes of an Empire"
 anatolia_intro.1.desc:0 ""The Federation of Anatolian States, colloquially known as the Anatolian Federation, was able to claw its way out of annihilation which imperial powers sought to impose upon it, rejuvinating under the doctrine of  Anatolianism, a modern evolution of Ottomanism, aiming to reconcile with the bloody past of the collapsing Ottoman Empire. This was in large part thanks to the circumstances of the post war years, and the clever calculations of Grand Vizier Dermid Pasha, as the Entente powers, failing in their European campaigns, were convinced in keeping a loyal pawn that would deter Bolshevik and Hunnic aggression in the Near East.\n\n Having to come to terms with it's brutal past, admitting the faults of the vicious and savagery of the dogmatic CUP militants who carried out untold oppression amongst populations under the Kemalist led "Three Pashas Triumavirite", the empire that had been for centuries been a flawed, yet beautifully tolerant nation, was cast into the darkest abyss in it's history, with untold lives and generations lost under their leadership.\n\n The main political force of this new state is the Liberal özgürlük partisi (LOP), taking in both dissaffected dissidents who had cut their ties with the disgraced CUP, and former HIF members, guiding the country alongside with the now largely figurehead Caliphate for the following years under the steadfast leadership of both Sabhaddin Ali and Ahmet Riza, both critics of one another at one point who would resolve their differences to lead the new state into it's golden age, overseeing the rapid industrialization of previously neglected cities such as Ankara, Trabizon, and Sivas.\n\n However not all is well in the empire, as the bureaucratic backwardness of the previous Ottoman state still is largely intact, due to the hard headed opposition of the Ulusal Düzen Partisi  (UDP), a big tent conservative-islamic alliance that seeks to keep the state a religiously islamic society, refusing attempts to modernise the heavily islamic system of education, which largely discriminates many non-muslims, especially in the medreses schools from which the islamic wing outright refuses to accept non-muslims into, whilst also advocating for more power in the hands of the Caliphate, and more moderate members of the party, idolising a more fair independent foreign policy that the LOP has pivoted country from, as well as a more top down approach to governance, although many are suspected to have connections to the menacing Karakol society.\n\n The future of Anatolia seems bright, with the re-establishment of the state as a beacon of democracy in a sea of illiberalism in neighbouring regions, it remains to be seen whether Grand Vizier Adnan Adivar Bey will steer the country's course further towards the path of enlightenment and rid the nation of her defeatism, in order to create something truly beautiful out of the darkness of her demons."
 anatolia_intro.1.a:0 "May Allah be with you, Grand Vizier!"
 
