 TUR_federation:0 "A Federation of Equals"
 TUR_federation_desc:0 "With the introduction of the Tanzimat Reforms in 1839, the wheels of progress began to turn. Albeit slowly, we have begun the process of emancipating the ethnic minorities of the former empire. With the brilliant statesman and former Grand Vizier Ali Sabhaddin and Ahment Riza, their combined efforts led to the unification of the various millets of the empire under the Hamayouni Decree of 1925 and the Ten Conditions of Ahmet Riza, both increasingly aiming for the unification of the federation in the name of Anatolianism. Although still in its infancy, the federation now gathers its strength, and perhaps in time, the peoples of this great nation will come to regard themselves as Anatolians above all else."
 TUR_unequal_treaties:0 "The Unequal Treaties"
 TUR_unequal_treaties_desc:0 "The collapse of the empire was due to Talaat Pasha's miscalculation in the great war. We had no friends or allies to speak of, and now, the fact that the caliphate is still alive is a miracle in and of itself.\n\nAt the cost of our national pride, however, under the treaties of Sevres and Sivas, signed after the war, we have relinquised our imperial past. This has not sat well with our citizens, with defeatism and radicalism still widespread amongst the families who lost thier husbands and sons in the holy lands and beyond."
 TUR_army_restrictions_mobilization_law_tt:0 "§RCannot increase conscription law.§!"
 TUR_foreign_expertise:0 "Foreign Expertise"
 TUR_growing_opposition:0 "Growing Ulema Opposition"
 TUR_karakol_society:0 "The Karakol Society"
 Anatolia_intro.1.t:0 "From the Ashes of an empire arises a faint hope"
 Anatolia_intro.1.d:0 "The Federation of Anatolian States, Colloquially known as the Anatolian Federation, was able to claw it's ways out of the predicted annihilation that imperial powers sought to bring upon the lands of the near east, carving a multi ethnic and multi cultural state, with it's own unique identity, known as Anatolianism, which aims to reconcile with the bloody past of the collapsing Ottoman Empire, was established following the treaty of  Sèvres  , which at first was predicted to wipe off the Turkish homelands and create a divided and colonially dominated near east that the great powers would leech off of, however, thanks to the circumstances of the post war years, and the clever calculations of Grand Vizier Dermid Pasha, a mandate, which would evolve into a federalised state, was formed, aimed to counter the rise of Bolshevism in the East, and as a strong power block that the defeated Entente could claim as their prized ally against the Prussian dominated Mitteleuropa to the West. /n/n These state of affairs have naturally been challenging for the fledgling nation, having to come to terms with it's brutal past, admitting the faults of the vicious and savage OHF militants who carried out untold oppression amongst populations who lived in harmony with other people's of the empire for centuries before through the millet system, which many might find the successor state to be a lesson from the almighty Allah himself. /n/n With the curbing of the past OHF members, the hurriyet ve itilaf, taking in dissaffected dissidents who had lost faith in the OHF following the seizure of the party apparatus by Mustafa Kemal Pasha, who would later fail to attempt to reorganise in Sivas, reformed itself into liberal özgürlük partisi  (LOP) which would go on to guide and rule the country alongside with the now largely figurehead Caliphate for the next few years under the steadfast leadership of both Sabhaddin Ali and Ahmet Riza, both critics of one another at one point who would lead the new state into it's golden age, overseeing the rapid industrialization of previously neglected cities such as Ankara, Trabizon, and Adana as beacons of prosperity. /n/n However not all is well in the empire, as the bureaucratic backwardness of the previous Ottoman state still is largely intact, due to the opposition of the Ulusal Düzen Partisi  (UDP), a big tent conservative-islamic alliance that seeks to keep the state a religiously islamic society, refusing attempts to modernise the heavily islamic system of education, which largely discriminates many non-muslims, especially in the medreses schools from which the islamic wing outright refuses to accept non-muslims into, whilst also advocating for more power in the hands of the Caliphate, whilst more moderate members of the party simply wish for a more independent foreign policy that the LOP has pivoted country to, and a more top down approach to governance, although many are suspected to have connections to the Karakol society. /n/n The future of Anatolia seems bright, with the re-establishment of the state as a beacon of democracy in a sea of illiberalism in neighbouring regions, but it remains to be seen whether Grand Vizier Adnan Adivar Bey will steer the country's course further towards the path of enlightenment and redeem the nation of defeatism, or if the observations of his rivals and usurpers will finally nail the coffin in a modern Anatolian Federal model."
 Anatolia_intro.1.a:0 "May Allah be with you, Grand Vizier"
 ### Characters ###
 TUR_adnan_adivar:0 "Adnan Adivar"
 POLITICS_ADNAN_ADIVAR_DESC:0 "After navigating through the relatively turbulent political climate following Ahmet Riza’s death, Adnan Adivar stands tall amongst both his rivals and his allies in the assembly, but more than his superb negotiating skills, medical, and military expertise, the polymath’s origins are even more bewildering to say the least.\n\nBorn in Gelibolu in what is now in the administrative zone of the Straits Commission, Adnan was born into a family brimming with knowledge and intellect, going on to excel in the School of Medicine, moving to Berlin for a time to assist with Austrian renowned Friedrich Kraus, getting inspired by the work in electrocardiography.\n\nReturning to Turkey as a chief medical doctor, he participated in the battle of Derna as chief medical inspector, which gave him a glimpse into the cruelties of war, joining the army soon after whilst also marrying his beloved Halide Edip, who some would consider to have been “overshadowing” him.\n\nNonetheless, with the collapse of the Ottoman fronts, Adivar positioned himself as a fierce opponent to imperial concessions to the Entente, however being a savior officer himself, he had to accept the overwhelming consensus to attempt to salvage the image of the empire and topple the CUP dominated triumvirate, leading him in posts in both medical and military cabinet positions in the successive governments.\n\nNow having politically maneuvered all other opponents within the party, Adivar in his short time in office has already accomplished much and promised even more; the reintegration of the Straits Commission into the Anatolian heartland, representing the people of Konstantinye, reforming the healthcare system, and for the first time meeting yearly debt repayments to the Entente since they had begun. He has signaled, however, his transformative reforms to be implemented in education, schooling and military will be a necessary step to “bring Anatolia to be not merely an asset, but a definitive beacon of the prosperous western world at large”, only time will tell if these promises are simply hot air, or the rebirth of a nation and her people."
 
