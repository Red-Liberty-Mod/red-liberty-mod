BAO_DAI_DESC:0 "Bao Dai was born on 22 October 1913 and given the name of Prince Nguyen Phuc Vĩnh Thuy in the Palace of Doan-Trang-Vien, part of the compound of the Purple Forbidden City in Hue, the capital of French Vietnam. He was later given the name Nguyen CAMh Thụy. His father was Emperor Khai Dịnh of Annam. His mother was the emperor's second wife, Tu Cung. After the French left the region of Indochina, Khai Dinh assumes rule over the kingdom of Dai Viet. After failing health and drug addication Khai dies and Bao Dai is thrust upon the thrown. By 1926 he now leads a nation facing economic turmoil, foreign economic imperialism and social unrest. In 1930 the great depression hits the nation hard, yet Bao Dai does little to save his nation's economy. Bao Dai organizes Japanese investment and later small Japanese garrisons around Japanese investments in Vietnam. Due to this submission to Japanese imperialism  an assassination atempt occurs in 1930 by Hoàng Hoa Thám( A leader in the Yen The insurrection), who atempts to break into the imperial palace and shoot the Emperor. The failled atempt to a public execution of Tham by firing squad. The execution is shown infront of hundreds of spectators. From this moment on marshal law is enforced from 1930 onwards.Its 1936 and Bao Dai faces multiple challenges that he originally faced. Question is; Will he still be emperor? "