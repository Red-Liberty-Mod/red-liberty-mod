 ### Naval ###
 USA_destroyer_2:0 "Farragut Class"
 USA_destroyer_2_desc:0 "The Farragut Class destroyers were the first US destroyers constructed post-Great War, and the first of the "1500 Tonner" designs meant to modernize the United States Navy."
 USA_destroyer_3:0 "Sims Class"
 USA_destroyer_3_desc:0 "The Sims Class was the largest "1500 Tonner" design with a more streamlined torpedo arrangement and longer hull. Improvement in fire control granted better attack capabilities with its 5"/38 caliber guns and included 12 centerline torpedo tubes."
 USA_battle_cruiser_1_desc:0 "The Lexington Class was constructed in reaction to Japan's Kongo class battlecruiser. Ordered by the Naval Act of 1916, the ships carried 16" guns in dual turrets and were capable of 33 knots."
 USA_carrier_1:0 "Langley Class"
 USA_carrier_1_desc:0 "USS Langley was the United States Navy's first aircraft carrier, converted in 1920 from the collier USS Jupiter, and was also the US Navy's first turbo-electric-powered ship."

