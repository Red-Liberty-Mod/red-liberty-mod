#ideas
 SYR_Faisal_I: "Faisal I"
 SYR_loyalism: "Hashemite Loyalism"
 SYR_loyalism_desc: "Following the Syrian army and Congress's betrayal of Faisal and Al Azma to make peace with the French and force Faisal to abdicate, many Syrians view the current mandated government as being made fully of traitors and that their support for the national movement is a lie, and they root for Al Azma and Faisal to march back onto Damascus and liberate Syria from the French."
 SYR_seperated_coast: "Separated Coast"
 SYR_seperated_coast_desc: "Following the coup against Faisal, the French were forced to give up the Holy Land to the British, and in an expected divide-and-rule manner, the French, after deposing Abdullah from Transjordan, have decided to split Syria into the states of Damascus. Jabal Druze, Aleppo, Lebanon, the Aliwaite State, and Transjordan, but following many protests and riots, especially after the Turks invaded Aleppo, the French United Syria except for the coastal regions populated by the Christians and Aliwaites, but this unlawful divide needs to either end or be formalized; ending the states of Lebanon and the Aliwaite state will result in a United Syria with public approval of the French and government increasing, but the latter option will probably result in the downfall of France in the Middle East."

 SYR_seperated_coast2: "Lebanon Seperated"

 SYR_corruption: "Widespread Corruption"
 SYR_corruption_desc: "There is no doubt that a region once under Ottoman control, now governed by a colonial authority, would experience the proliferation of corruption, the establishment of oligarchies, and the emergence of monopolistic practices. Furthermore the entrenchment of the powerful aristocracy that exerts significant influence over both rural and urban areas. The Pashas, Beys, and Sheikhs would impose their authority on the Syrian populace, extending their dominion from the Jazira region to the coastal areas, thereby maintaining an iron grip on the lives of the people."

 SYR_flawed_democracy: "Flawed Democracy"
 SYR_flawed_democracy_desc: "Despite the imposition of the French Mandate upon the Syrian people following the congress betrayal of Faisal, the Syrian congress after the fall of Faisal has managed to preserve a semblance of a democratic framework. While this system is undeniably flawed and riddled with shortcomings, it nonetheless continues to function, demonstrating a degree of resilience in the face of external pressures."
 SYR_good_enough_democracy: "Good-Enough Democracy"
#events
 syria.0.t: "Levantine Nights"
 syria.0.d: "In the beginning the Ottomans ruled the Levant and the Arabs, then a Serb said let there be war, igniting the Great War. This turbulent period led to the fall of the old order in the Middle East, resulting in the fall of the Ottoman Empire. Syria, under the leadership of Faisal and his supporters, briefly tasted freedom, but this newfound independence attracted the bloodhounds of the French colonial empire, eager to claim Syria for themselves. The British, opting to withdraw their focus from Syria to concentrate on the Holy Land, left a power vacuum that the French swiftly filled with an invasion. In a bid to maintain control, the national congress of Syria struck a deal with France, compelling Faisal to step down. His brother Abdullah attempted to establish a foothold in transjordan but was quickly overran by French forces.\n\n Subsequently, the French opted to federalize Syria into several states within a federation, a move that was met with widespread discontent, culminating in the 1925 revolution that dismantled the Syrian federation and established the State of Syria. However, the coastal regions remained under direct French oversight, mostly claiming to safeguard the interests of Christians and Alawites. In 1932, as Syria wanted constitutional changes, but the political upheaval in Egypt, which ousted British political administration, forced the French to maintain the existing order and cement their control, although they faced increasing pressure to address the delayed referendum regarding the reintegration of the coastal territories."
 syria.0.a: "It is barbaric but hey it is home"
 syria.1.t: "French Authority raid Commemoration "
 syria.1.d: "The French authorities decided to raid a commemoration for Ibrahim Hannu organized by radical members of the National Bloc, which featured several speeches lamenting and criticizing the French occupation. The French authorities later issued a statement on behalf of the president, claiming that he condemned such secret meetings and had no prior knowledge of the raid. This, of course, not only confused the government but also angered the National Bloc. In response, the party has announced that a congress will be held soon."
 syria.1.a: "Oh no..."
 syria.2.t: "Liberals split off"
 syria.2.d: "Frustrated with the Conservatives and Moderates' attempts to cooperate with the French, the Liberals and Radicals decided to break away and establish their own political entity, the People's Party. Their goal now is to lead a formal opposition to French rule, rallying the populace and calling for nationwide riots and strikes to challenge the occupation."
 syria.2.a: "Great"
 syria.3.t: "Ata Bey resigns"
 syria.3.d: "Amid heated debates within the National Bloc party, the president announced his decision to resign in an effort to preserve party unity. He nominated Hashim Al-Atassi as his successor, entrusting him with the task of leading peaceful independence negotiations with the French."
 syria.3.a: "Great"
 syria.4.t: "[GetMonth] Strike Starts"
 syria.4.d: "Following the collapse of the National Bloc, the Syrian people took to the streets, rejecting the French mandate and demanding liberty and independence. Protests escalated into strikes and attacks on French police units. The People's Party intensified its opposition through widespread newspaper campaigns and impassioned public speeches. Arab tribes refused to assist the French army, while Damascus swelled with protesters. Coastal cities also erupted in massive demonstrations, with tobacco fields set ablaze in acts of defiance."
 syria.4.a: "Great"
 syria.5.t: "The situation in Syria"
 syria.5.d: "Following the collapse of the National Bloc, the Syrian people took to the streets, rejecting the French mandate and demanding liberty and independence. Protests escalated into strikes and attacks on French police units. The People's Party intensified its opposition through widespread newspaper campaigns and impassioned public speeches. Arab tribes refused to assist the French army, while Damascus swelled with protesters. Coastal cities also erupted in massive demonstrations, with tobacco fields set ablaze in acts of defiance. Should the French state hear the people's demands for self-determination, or should we wait for tensions to calm down?"
 syria.5.a: "No point in pushing the matter"
 syria.5.b: "We will wait"
 syria.6.t: "The Syrian Army joins the People"
 syria.6.d: "The Syrian Army, led by a group of officers, overthrew the government and ended Yusuf al-Azam's decade-long house arrest, appointing him to lead the newly liberated nation against French control. Meanwhile, the Alawite tribes rebelled and, with the support of the army, were integrated into Syria proper. The Germans might have had a hand in the matter.\n\n O France, the time of reproof is over\n And we have closed it as a book is closed;\n O France, this is the day of reckoning"
 syria.6.a: "Long Live Syria"
 syria.7.t: "The riots ends"
 syria.7.d: "Following the French declaration that it would respect the will of the Syrian people, the riots subsided, paving the way for the commencement of independence negotiations. Sabri Al Asali is appointed interim president."
 syria.7.a: "Long Live Syria"
 syria.8.t: "The Negotiations"
 syria.8.d: "The French authorities proposed three potential scenarios for the future of Syria in response to growing demands for independence. In the first scenario, Syria would achieve full independence, but France would retain control over the coastal regions. In the second scenario, the French army would remain stationed in the Alawite State, which would be reintegrated into an independent Syria. Finally, the third scenario offered Syria complete sovereignty over its coastal territories; however, the French mandate would persist for several more years before granting full independence. Each scenario presented its own challenges and implications, leaving the Syrian negotiators to carefully weigh their options in pursuit of national unity and self-determination."
 syria.8.a: "Syria must be free"
 syria.8.b: "Freedom does come with a Price"
 syria.8.c: "Syria must be united"
 syria.9.t: "The French Leave Syria"
 syria.9.d: "The French authorities will finally leave Syria"
 syria.9.a: "Syria is free"