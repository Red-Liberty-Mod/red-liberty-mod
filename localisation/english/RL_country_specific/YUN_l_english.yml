 ### Leaders ###
 YUN_miao_yuntai:0 "Miao Yuntai"
 YUN_tang_jiyao:0 "Tang Jiyao"
 POLITICS_TANG_JIYAO_DESC:0 "§YBorn:§! §LAugust 14th, 1883, in Qujing, Yunnan Province, Qing Empire§!\n§YBackground:§! Once the commander in chief of the National Protection Army, Tang Jiyao became the de facto head of state for Yunnan after the front collapsed. Tang still claims leadership of the National Protection Army, but with the exception of Zhejiang, the other warlords seem to have forgotten this.\n\nThe National Protection War ended in a stalemate, and the alliance has fallen into a sorry state since then. Tang Jiyao must reunite the National Protection Front in order to stand a chance against the Emperor, but at the moment, his hands are tied by politics. In Yunnan, there are three pillars that Tang must dance atop to keep his control: the black market, the army, and the Kuomintang. The balancing act between these three has become more and more desperate as of late. Ultimately, something has to give, and if Tang is not careful, it might be him..."
 
