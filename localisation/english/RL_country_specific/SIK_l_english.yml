 POLITICS_YANG_ZENGXIN_DESC:0 "Yang Zengxin was born in Mengzi, Yunnan Province, in 1864. Though a Han Chinese, he had connections with the leading Muslim families of Yunnan and was knowledgeable about Islam and Islamic culture. After passing the imperial examination and becoming a jinshi degree holder in 1899, Yang was assigned to Xinjiang by the Qing government in 1907. He played a crucial role in shaping Xinjiang's modern boundaries by dismantling the posts of Altay minister, Tarbagatai councilor, and Ili general, thereby removing their self-rule and placing them under direct control from Beijing.\n\nYang Zengxin came to power in Xinjiang after defeating revolutionaries who had caused the last Qing governor, Yuan Dahua, to flee during the Xinhai Revolution. President Yuan Shikai recognized Yang's rule, and Yang, in return, supported Yuan's attempt to revive the monarchy. In a dramatic show of loyalty, Yang invited Republican anti-Yuan rebels to a banquet and decapitated them on New Year's Day, 1916. Yang believed a monarchy was the best system for China, and some Western travelers noted, with approval, that Yang was a former Mandarin, unlike the Republican governors of other provinces.\n\nHowever, by 1936, Yang faces significant challenges from Uyghur separatist resistance. The pressing question remains: Can he maintain control over the volatile and strategic Northwest region of China? Yang's ability to manage the diverse and often contentious populations of Xinjiang, coupled with his approach to governance and alliances, will be critical in determining his success in controlling the area amidst growing unrest."
 
