 FWA_peanut_economy:0 "Peanut Economy"
 FWA_peanut_economy_desc:0 "Much of the West African economy is centered around the cultivation of peanuts. Though this has brought great profits, this reliance on cash crops has caused noticable food insecurity across the colony."
 
 ### Events ###
 french_west_africa.2.title:0 "Governor of French West Africa Retires"
 french_west_africa.2.desc:0 "In the grand chambers of the Ministry of the Colonies in Paris, a hushed tension fills the room as officials gather to deliberate on a crucial decision - the appointment of a new Governor-General of French West Africa. Joseph-Jules Brévié's tenure has come to an end, and with the empire’s African holdings growing ever more vital to France's economy and strategic interests, his replacement must be chosen carefully. Three candidates have emerged, each representing a distinct vision for the colony’s future.\n\nThe first is Marcel de Coppet, a veteran administrator known for his methodical governance and preference for gradual reform. A staunch defender of French colonial rule, de Coppet advocates for a pragmatic approach, balancing economic development with cautious social policies aimed at preserving stability. His supporters in the colonial administration argue that he will maintain order without upsetting the delicate balance between the French authorities and local elites.\n\nThe second candidate, Léon Geismar, represents a more liberal faction within the colonial office. With a background in law and administration, he favors limited political concessions to African leaders and an expanded role for indigenous officials in governance. His candidacy is championed by those who believe that France must modernize its colonial approach to prevent unrest and ensure long-term loyalty from its African subjects. However, hardline conservatives view him as dangerously soft on the question of imperial authority, not to mention his being a Jew.\n\nThe final contender, Pierre Boisson, is a staunch authoritarian and a firm believer in centralized control over the colonies. With experience in the colonial police and administration, he advocates a hardline approach to governance, prioritizing military discipline, economic exploitation, and the suppression of any nationalist agitation. His backers - primarily military officers and business interests - argue that only a firm hand can secure French dominance in West Africa, especially as tensions rise across the empire."
 french_west_africa.2.a:0 "Send Marcel de Coppet."
 french_west_africa.2.b:0 "Elevate Leon Geismar."
 french_west_africa.2.c:0 "Appoint Pierre Boisson."
 
