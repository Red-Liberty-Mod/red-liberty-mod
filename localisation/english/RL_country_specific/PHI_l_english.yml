 PHI_social_democracy_party_long:0 "Partido Democrata\n§gFounded shortly before independence in 1917, the Democrat Party has since served as the country's main opposition party. Dominated by the ideology of its founder, Juan Sumulong, the party stands for a social democratic, nationalist economy and an independent foreign policy free of foreign influence.§!"
 PHI_progressive_liberalism_party:0 "PL"
 PHI_progressive_liberalism_party_long:0 "Partido Liberal\n§gThe Liberal Party was founded by dissatisfied members of the liberal wing of the Nationalist Party in the years after independence. While still committed to a capitalist economy, the party supports greater government oversight, as well as a stronger land reform than the mainstream of the Nationalists.§!"
 PHI_liberal_conservatism_party:0 "PN - Consolidado"
 PHI_liberal_conservatism_party_long:0 "Partido Nacionalista - Consolidado\n§gFounded in 1901, the Nationalist Party spent much of its early years working towards freedom for the island nation. With independence achieved in 1917, the party's dominant position in the assembly has slowly withered, and it no longer enjoys the absolute decision-making it once was capable of.§!"
 #During this time, the party's early ideology consisted of little more than Filipino Nationalism, which, while allowing it to dominate the national assembly, left it unstable.
