 ### Ideas ###
 NFL_grand_banks_fisheries:0 "Grand Banks Fisheries"
 NFL_grand_banks_fisheries_desc:0 "Colonized in the seventeenth century, the island of Newfoundland has been world-renowned for its immensely profitable fishing industry off the eastern coast, localized almost entirely in the hands of private businesses and fishing families that have operated for hundreds of years. Finding employment is not a tough find whilst the fishing season is active, keeping the people of Newfoundland fed and paid well - even if the government is not."
