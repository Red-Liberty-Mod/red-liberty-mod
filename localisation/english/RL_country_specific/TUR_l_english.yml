 ### Ideas ###
 TUR_federation:0 "A Federation of Equals"
 TUR_federation_desc:0 "With the introduction of the Tanzimat Reforms in 1839, the wheels of progress began to turn. Albeit slowly, we have begun the process of emancipating the ethnic minorities of the former empire. With the brilliant statesman and former Grand Vizier Ali Sabhaddin and Ahmet Riza, their combined efforts led to the unification of the various millets of the empire under the Hamayouni Decree of 1925 and the Ten Conditions of Ahmet Riza, both increasingly aiming for the unification of the federation in the name of Anatolianism.\n\nAlthough still in its infancy, the federation now gathers its strength, and perhaps in time, the peoples of this great nation will come to regard themselves as Anatolians above all else."
 TUR_unequal_treaties:0 "The Unequal Treaties"
 TUR_unequal_treaties_desc:0 "The collapse of the empire was in large part due to Talaat Paşa's miscalculation in the Great War. We had no friends or allies to speak of, and now, the fact that the caliphate is still alive is a miracle in-and-of itself.\n\nIt has come at the cost of our national pride however, as under the treaties of Sevres and Sivas, signed after the war, we have relinquised our imperial past. This has not sat well with our citizens, with defeatism and radicalism still widespread amongst the families who lost their husbands and sons, in the holy lands and beyond."
 TUR_foreign_expertise:0 "Foreign Expertise"
 TUR_foreign_expertise_desc:0  "We'd be foolish to deny the tangible gains in our economy post-war would have occured had it not been for the foreign experts sent by the western powers.\n\nSeeing us as a bulwark against Bolshevism in the east and Prussianism in the Balkans, French and British expertise has fueled a revitilisation of our industries, propelling us into an industrialisation process that simply could not be achieved in the largely feudal systems that governed the old empire. If we were to in any case deviate from our westernised and civilised path however, this support may swiftly be reconsidered, causing untold havoc on our industrial base."
 TUR_growing_opposition:0 "Growing Ulema Opposition"
 TUR_growing_opposition_desc:0 "With the government's radical shift in approach to the attitudes to the people of the former imperial dominion, the conservative elements in society have voiced their concerns of "autonomy" and the right to practice and profess islam in state and public gatherings, and have smeared our efforts of unifying the religions and cultures of the Anatolian people's as "laicité suffocation", mocking the so called French influence in our state.\n\nIf we are to push through reforms with regards to unifying education and our religious institutions, we can safely expect our Imams to call for jihad against the perceived unholy policies."
 TUR_karakol_society:0 "The Karakol Society"
 TUR_karakol_society_desc:0 "Following the disintegration of the empire, and the failed national revolution, Enver Paşa and his acquaintances retreated into the shadows; with their tempting promises of "avenging the backstabbing by the greco-armenian lobbyist dogs through a national jihad", these radicals hold a degree of sway in our government, whether we believe it or not.\n\n§rContinuing to turn a blind eye to this issue may have... unforseen consequences, should the political climate be at a knife's edge.§!"
 
