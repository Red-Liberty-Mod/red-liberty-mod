 ### EVENTS ###
 anatolia.1.title:0 "From the Ashes of an Empire"
 anatolia.1.desc:0 "The Federation of Anatolian States, commonly referred to as the Anatolian Federation, emerged from the brink of destruction, overcoming the imperial powers' attempts to annihilate it. This resurgence was facilitated by the adoption of Anatolianism, a modern iteration of Ottomanism, aimed at reconciling with the tumultuous history of the collapsing Ottoman Empire. Grand Vizier Dermid Paşa played a pivotal role in navigating the post-war landscape, persuading the Entente powers to support Anatolia as a bulwark against Bolshevik and Hunnic aggression in the Near East.\n\nConfronting its turbulent past, the federation acknowledged the atrocities committed under the Kemalist-led "Three Pashas Triumvirate," which plunged the once-tolerant empire into its darkest chapter. The Liberal Freedom Party (Liberal Özgürlük Partisi, LOP) emerged as the dominant political force, uniting disenchanted dissidents from the disgraced Committee of Union and Progress (İttihad ve Terakki Cemiyeti, ITC) and former members of the Freedom and Accord Party (Hurriyet ve Itilaf Fırkası, HIF). Under the leadership of Sabhaddin Ali and Ahmet Riza, erstwhile critics who reconciled their differences, the federation embarked on a period of rapid industrialization, revitalizing neglected cities such as Ankara, Trabzon, and Sivas.\n\nHowever, challenges persist within the federation. The bureaucratic inertia inherited from the Ottoman era persists, exacerbated by the staunch opposition of the National Order Party (Ulusal Düzen Partisi, UDP), a conservative-Islamic coalition resisting modernization efforts, particularly in education. The UDP advocates for a more religiously oriented society, emphasizing the role of the Caliphate and promoting discriminatory practices in Islamic schools. While some members of the party advocate for a fairer foreign policy and a centralized governance approach, suspicions linger regarding their ties to the clandestine Karakol society.\n\nDespite these obstacles, Anatolia's future appears promising. Positioned as a beacon of democracy amidst regional illiberalism, the federation stands poised to chart a course toward enlightenment under the leadership of Grand Vizier Adnan Adivar Bey. The challenge lies in overcoming defeatism and harnessing the nation's resilience to forge a brighter future from the shadows of its past demons."
 anatolia.1.a:0 "May Allah be with you, Grand Vizier!"
 
