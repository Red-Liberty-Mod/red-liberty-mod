 TUR_adnan_adivar:0 "Abdülhak Adnan Paşa"
 TUR_adnan_adivar_surname:0 "Abdülhak Adnan Adivar"
 POLITICS_ADNAN_ADIVAR_DESC:0 "§YBorn:§! §L1882, in Gelibolu, Ottoman Empire§!\n§YBackground:§! After weathering the storm of Ahmet Riza's demise, Adnan Paşa emerges as a towering figure in the political arena, earning respect from both allies and rivals in the assembly. Yet, beyond his remarkable negotiation skills, medical expertise, and military prowess, Adnan's origins are equally remarkable.\n\nBorn in Gelibolu, within what is now under the jurisdiction of the Straits Commission, Adnan hails from a family renowned for their intellect and erudition. Excelling in the School of Medicine, he further honed his skills in Berlin under the tutelage of the renowned Friedrich Kraus, particularly inspired by advancements in electrocardiography.\n\nReturning to the empire armed with his newfound knowledge, Adnan served as the chief medical inspector during the Battle of Derna, witnessing firsthand the horrors of war. He later joined the army, while also marrying his beloved Halide Edip, a figure often seen as overshadowing him.\n\nAfter the war, despite his opposition to further concessions to the Entente, Adnan, as a savior officer, reluctantly accepted the consensus to salvage the empire's image and dismantle the CUP-dominated triumvirate. This led to his appointment to various medical and military cabinet positions in successive governments.\n\nHaving outmaneuvered his political rivals within the party, Adnan has already achieved significant milestones during his short time in office. He has pledged to reintegrate the Straits Commission into Anatolian territory, represent the people of Constantinople, overhaul the healthcare system, and meet yearly debt repayments to the Entente. He has also signaled plans for transformative reforms in education, schooling, and the military, envisioning Anatolia as a beacon of prosperity in the western world. Only time will reveal whether these promises are mere rhetoric, or the dawn of a new era for the nation and its people."
 
 TUR_kazim_karabekir:0 "Kâzım Karabekir Paşa"
 POLITICS_KAZIM_KARABEKIR_DESC:0 "A man of multifaceted talents and undeniable military prowess, Kâzım Karabekir stands as one of the most influential military figures in Anatolia following the empire's collapse. Despite his revered status, his upbringing hints at a humble origin.\n\nBorn into a family with roots tracing back to the Tatars of Central Asia, his ancestors settled in Rumelia as part of a land grant for defending against Greek rebellions in the 17th and 18th centuries. His education took him from the imperial capital to Mecca, and later to military schools in Constantinople. His battlefield skills became apparent during the suppression of the 1910 Albanian revolt and the Balkan campaigns alongside Kemal Paşa, notably demonstrating his strategic acumen at the Battle of Edirne.\n\nEarning his promotion to field marshal due to his successes in Syria and Baghdad against combined French and British forces, he distinguished himself as one of the few strategists to effectively resist Allied invasions in the Arabian Peninsula.\n\nDespite his efforts, he could not halt the empire's decline, eventually reluctantly signing the Sivas Declaration after betraying his former comrade-in-arms to secure a future for the fledgling federation. Advising the government on centralizing authority and renegotiating treaty terms, his efforts to modernize the army, excepting some resistance, have largely succeeded.\n\nNow leading a beleaguered yet proud nation, he aims to usher in a new era of modernity through an autarkic governance model, seeking to nationalize and centralize administration for self-sufficiency. However, his policies have drawn criticism from foreign press and internal factions. Walking a fine line to avoid provoking rivals, he strives to steer the nation away from dogmatism and self-interest toward a prosperous future."
 
 TUR_riza_tevfik:0 "Riza Tevfik Bey"
 POLITICS_RIZA_TEVFIK_DESC:0 "Any discussion on Turkish literature and the education system would be incomplete without the mention of Riza Tevfik, a pivotal figure in both realms. As one of the founding fathers of modern Turkish literature, his contributions are as significant as his revolutionary ideals.\n\nBorn in the county of Cisr in the former province of Edirne, Riza Tevfik seemed destined for greatness from a young age. His father, a district governor, provided a solid foundation, and Riza excelled academically, graduating with honors from the prestigious Gellibolu Secondary School. Initially pursuing medicine, he later shifted his focus to literature and sciences, recognizing the dearth of such pursuits in the declining Ottoman Empire. His involvement with the CUP eventually waned, leading him to align with the more liberal Freedom and Entente Party, though he remained politically distinct from many of his colleagues.\n\nFollowing the post-war humiliation, Riza found himself among the signatories of the Treaty of Sivas, tarnishing his reputation, especially among his students. However, he sought redemption by entering the medical bureaucracy while secretly aligning with the revolutionary Kadro literary movement, led by figures like Şevket Süreyya Aydemir. This collaboration bolstered his left-leaning views and revolutionary ideas within parliament, culminating in the formation of his own grouping advocating for social democratic ideals akin to those in the UK and the US.\n\nNow at the helm of the Anatolian Federation, Riza Tevfik's ambitions are far-reaching. From reforming the medical sector to prioritize affordability and efficiency, to elevating the working class as the Federation's centerpiece and fostering a proletarian culture within the framework of a market economy, his vision is vast. However, he faces opposition not only from within his coalition but also from allies in the Kadro circle, who seek to manipulate him to advance their more Bolshevik agenda. Navigating these challenges requires delicate balance and astute diplomacy, for a successful revolution hinges on a sound and strategic approach."

 TUR_fethi_okyar:0 "Ali Fethi Paşa"
 POLITICS_FETHI_OKYAR_DESC:0 "Seen by many as merely as the handpicked successor to Adnan following his downfall, Fethi Paşa is much more than meets the eye, having served as a military liason, and as one of the utmost diplomats to the United Kingdom in his tenure, he has been the darling of much of the established intelligenstia within the party, who view him as both experienced and well positioned in not only unifying the party, but the nation as a whole. \n\n His central aim is to continue the path of his predecessors, of both delegating responsibility for the crimes of the Young Turks, and to modernise and liberalise the economy of the federation, although unlike Adnan, who pursued a policy of government oversight that some within the party called socialistic in nature, Fethi is by no means willing to step on the tails of the minority groups and interests within the vast federation, which to some may be a hinderance to governing and truly modernising the destitute feudal lives of these groups especially in the near east, whilst others would find this to be respecting the wishes and the wills of the federation's peoples, which Adnan had nearly risked at provoking.\n\nWith a coalition that has struggled to find its identity having been in power for so long, Fethi is also in favour of working with the opposition, officially to bridge the divide amongst the more conservative and critical voices in the country, whilst speculatively it is in order to solidify a conservative block that would superceede the necessity of the coalition, in light of continued attempts at chipping away at it's more moderate core towards degenerate statist policies, but time shall tell whether these concerns are mere slander, or deadly accurate."
 
