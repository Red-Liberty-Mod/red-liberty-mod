 ## Crisis Tree Events ##
 anatolia.12.title:0 "Response from the Commission"
 anatolia.12.desc:0 "Under the guidance of the Grand Vizier, Mehmet Akif Ersoy embarked on a crucial mission: to secure recognition from the Entente powers of Anatolia's rightful claim to the region and renegotiate the terms of the Treaty of Sivas. In a pivotal moment, a telegraph message arrived, bearing the urgent label "Önemli" (Important).\n\nThe message conveyed the openness of the Allied powers, particularly France, to renegotiate terms. However, it came with conditions; further opening of markets to French and English businesses and a commitment to maintain democracy in the region. In exchange, Anatolia would gain the right to remilitarize and secure its territorial boundaries, notably over the Bosphorus channel.\n\nWhile the Vizier saw the value in strengthening commercial ties, he faced opposition from nationalist circles within his coalition. They viewed further concessions to the British and French as compromising the nation's sovereignty, advocating for collaboration with Germany instead.\n\nAs the Vizier deliberated, the stakes were clear: the coalition's political legitimacy hinged on reclaiming the straits as a symbol of national pride. The decision, whether with his consent or without it, would shape Anatolia's future."
 anatolia.12.a:0 "To work, then."
 
