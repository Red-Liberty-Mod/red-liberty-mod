 ### Events ###
 spain.2.title:0 "An Audience With The King"
 spain.2.desc:0 "Maura reaffirms his loyalty to Alfonso XIII in a private audience. The King is reassured, for now."
 spain.2.a:0 ""
 
 spain.4.title:0 "Land and Loyalty"
 spain.4.desc:0 "Parliament debates redistribution of idle estates. Landowners lobby against it; peasants threaten revolt if nothing is done."
 spain.4.a:0 "Please, can't we come up with something?"
 
 spain.5.title:0 "Barcelona's Petition"
 spain.5.desc:0 "Catalan leaders submit a request for the restoration of the Commonwealth of Catalonia. The court and the King view this as dangerous decentralization."
 # although its existence was brief and its powers limited,
 spain.5.a:0 "This cannot be permitted."
 spain.5.b:0 ""
 
 spain.6.title:0 "Cheers and Jeers"
 spain.6.desc:0 "The King's public tour sparks mixed reactions. In Castille, crowds cheer; in Catalonia, protests erupt."
 spain.6.a:0 "At least no-one shot at him."
 
