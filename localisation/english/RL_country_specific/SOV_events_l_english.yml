 sov_congress.12.title:0 ""
 sov_congress.12.desc:0 "In a dramatic and unexpected turn, Alexander Shliapnikov has been elected Chairman of the Government of the RSFSR by a narrow majority in the Congress of Soviets. A veteran metalworker, trade unionist, and leader of the Workers' Opposition, Shliapnikov’s elevation marks a sharp shift in the political mood - one evidently favoring worker control, grassroots democracy, and a challenge to entrenched bureaucratic power.\n\nAs he takes the podium, Shliapnikov’s voice rings with conviction: \"The workers built this republic with their hands and their blood. Now, it is time they truly govern it.\" His speech electrifies the hall, especially among labor delegates and left oppositionists, who see in him a chance to revive the early revolutionary promise of direct proletarian rule.\n\nShliapnikov's agenda is bold and confrontational:\n\n1. Empowering Trade Unions – Restoring meaningful power to factory committees and unions, giving workers a real say in production and administration. He further derides the NEP as \"state capitalism,\" making plain his intention to abolish it in favor of a planning commission.\n2. Decentralization of Authority – Reducing the role of central bureaucracies in favor of local soviets and workplace democracy.\n3. Socialist Renewal - Combating corruption and careerism within the party-state apparatus, and reasserting the principles of class solidarity and rank-and-file control.\n\nThough cheered by many workers and younger revolutionaries, Shliapnikov's election sets off alarm bells within the party leadership. His past clashes with the Central Committee are well known, and his open criticism of party bureaucracy is sure to provoke resistance from powerful figures in Moscow.\n\nYet for the moment, the tide has turned. The RSFSR now has a chairman who speaks the language of the shop floor, not the committee room - and who believes that socialism must once again belong to the workers themselves."
 sov_congress.12.a:0 "Good luck, comrade!"
  
 sov_congress.13.title:0 ""
 sov_congress.13.desc:0 "In a vote noticeably less unamimous than many held in the last twenty years, Lev Kamenev has been elected Chairman of the Goverment. A veteran Bolshevik and skilled conciliator, Kamenev's appointment reflects an apparent desire for moderation, unity, and a return to structured governance after a period of inter-factional tension.\n\nAs he steps before the Congress to accept his post, Kamenev delivers a speech that surprises even some of his allies. Rather than the usual appeals to class struggle and centralization, he speaks of reviving the spirit of democratic socialism, calling for a \"renewal of soviet democracy\" through open elections within local soviets, broader political participation, and an end to the stifling bureaucratism that has plagued the republic in the wake of war and repression.\n\n\"The revolution was made not to enthrone a new elite, but to empower the worker and the peasant. It is time we remember that,\" Kamenev declares to murmurs of approval - and a few glares of suspicion.\n\nYet his priorities are not merely political. He outlines an ambitious program of reconstruction in the countryside, which has been devastated by years of civil war, forced requisitions, and unrest. Kamenev pledges to expand cooperative agriculture with state support, repair rural infrastructure, and invest in rural schools and clinics. He proposes a new land reform commission to address the growing discontent among smallholders, seeking to balance the needs of the peasantry with the ideological commitments of the socialist state.\n\nThough some hardliners within the party view Kamenev's approach as dangerously conciliatory, others recognize the necessity of rebuilding trust in a wounded nation. His government pledges to dispatch survey teams and agrarian planners to assess the needs of each oblast, while also holding public forums in rural soviets to gather feedback - a bold step in a system where directives usually come from the top down.\n\nAs Kamenev begins his tenure, tensions remain beneath the surface. Reformers quietly rally behind him, hoping for a genuine liberalization of the Soviet system. Skeptics, including powerful figures in the Central Committee, bide their time, watching closely for signs of weakness - or strength."
 sov_congress.13.a:0 "Good luck, comrade!"
 
 sov_congress.14.title:0 "Soldiers Storm the Congress!"
 sov_congress.14.desc:0 "In the early hours of a tense spring morning, the Congress of Soviets in Moscow is thrown into chaos. As delegates gather to debate the future of the RSFSR, the doors of the congress hall suddenly burst open. Red Army soldiers, armed and resolute, flood into the chamber, their heavy boots thudding on the marble floor. The hall, once buzzing with the fervor of political discourse, is silenced in an instant.\n\nThe soldiers, loyal to Mikhail Tukhachevsky, the ambitious and respected Marshal of the Red Army, push through the aisles and take control of the chamber with military precision. Their arrival is the culmination of weeks of mounting tensions within the ranks of the military and party leadership. Tukhachevsky’s name has long been associated with bold military strategy and a vision for a stronger, more centralized Soviet state. Now, the moment has come to seize power.\n\nAt the front of the hall, Tukhachevsky himself steps forward, flanked by his officers. His face is calm, almost regal, as he gazes upon the stunned assembly. \"The revolution is at a crossroads,\" Tukhachevsky declares, his voice cutting through the stunned silence. \"We cannot afford the luxury of endless debate. The time for action is now. The military will guide this republic to stability and strength. I am here to ensure the survival of the Soviet state.\"\n\nIn a matter of minutes, the Red Army soldiers have surrounded the leadership of the Congress, and those who resist are quickly subdued. Tukhachevsky is installed as Chairman of the RSFSR government, his authority cemented by the overwhelming force of the military. The Congress, though shaken, is given a stark choice: submit to his leadership or face the consequences of rebellion."
 sov_congress.14.a:0 ""
 
