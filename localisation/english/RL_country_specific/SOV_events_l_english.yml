 sov_congress.9.title:0 "Kirov Reporting"
 sov_congress.9.desc:0 "The announcement of Sergei Kirov's election as Chairman is greeted with thunderous applause from the Congress of Soviets, where his reputation as a loyal party man, a war veteran, and a popular figure among both workers and soldiers secured wide support.\n\nKirov ascends to the chairmanship with a clear mandate; to reassert central authority, restore confidence in the government, and revitalize the Soviet project in a republic still recovering from civil war, internal factionalism, and economic hardship.\n\nHis tone is warm but resolute as he takes the podium to address the Congress. \"Comrades,\" he begins, \"we have endured hunger, war, and sabotage - but the Soviet people have not broken. Now we must rebuild, not only with steel and timber, but with faith in each other and in the revolution that gave us life.\"\n\nKirov outlines a three-point program for national recovery:\n\n1. Industrial Consolidation and Revival – Kirov calls for the elimination of the NEP, to be replaced with a system of central planning. A five-year plan will focus on rebuilding transport links, restoring factories damaged in the war, and increasing state investment in energy and metallurgy.\n2. Rural Stabilization – While not a radical reformer, Kirov acknowledges the need to stabilize the countryside. He proposes more structured support for collective farms and better provisioning of rural areas to prevent unrest. Grain procurement quotas will remain, but with increased state investment in machinery and training for peasant cadres.\n3. Party Unity and Order – Perhaps most crucially, Kirov pledges to \"cleanse the party of paralysis and petty intrigue,\" seeking to mend divisions within the RKP. Known for his charisma and affability, he pledges to hold regular consultations with both moderate and hardline factions, presenting himself as a stabilizing force amid growing tensions between ideological camps.\n\nThough not overtly reformist, Kirov’s leadership style reflects his strength as a builder of consensus. His approachable demeanor and roots in Leningrad's party apparatus give him a connection to the rank-and-file that few Soviet leaders can match. In the streets and factories, portraits of Kirov begin to appear beside those of Lenin - to some, symbols of a new moment of hope. To others, a leader whose popularity could one day outgrow the role he's just assumed."
 sov_congress.9.a:0 "Good luck, comrade!"
 
 sov_congress.10.title:0 ""
 sov_congress.10.desc:0 "In a decisive vote by the Congress of Soviets, Grigori Sokolnikov has been elected Chairman of the Government of the RSFSR. Known for his sharp intellect, economic expertise, and key role in stabilizing the ruble during the early years of the revolution, Sokolnikov is seen as a technocrat capable of steering the republic through its fragile recovery.\n\nTaking the podium, Sokolnikov delivers a crisp, focused address. \"The foundation of socialism must be built not only on ideals, but on sound policy and material strength,\" he declares. He frames his expected tenure around economic reconstruction, state efficiency, and fiscal discipline, promising to bring order to the republic's strained finances and ensure that recovery efforts are both sustainable and socialist in character.\n\nHis key priorities include:\n\n1. Economic Rationalization – Streamlining the state apparatus, reducing bureaucratic waste, and improving industrial productivity with incentives for efficient planning and output.\n2. Currency and Trade Reform – Further stabilizing the ruble and cautiously reintroducing controlled domestic trade to revive peasant and worker confidence in the system.\n3. Technocratic Governance – Elevating trained economists, engineers, and planners to positions of authority, moving the RSFSR toward a more professional and data-driven model of administration.\n\nSokolnikov’s election signals a shift toward pragmatism and administrative competence, appealing to those exhausted by ideological dogmatism and internal squabbles. Though lacking the charisma of other party leaders, he is respected - and feared - for his precision and political independence.\n\nSome within the party whisper that his cool detachment and reformist leanings could challenge the old guard. But for now, the RSFSR has placed its future in the hands of a man who believes socialism must be built to function, not just dreamed into being."
 sov_congress.10.a:0 "Good luck, comrade!"
 
