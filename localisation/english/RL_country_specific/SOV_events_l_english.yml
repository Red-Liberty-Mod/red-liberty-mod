 soviet_union.50.title:0 "The Chairman's Letter"
 soviet_union.50.desc:0 "Comrades,\n\nI have led our government now for more than a decade. Since the passing of our dear Comrade Lenin, we have seen a great many trials and tribulations. But to everything in this world there comes an end; there even comes an end to the torments suffered in those intermediate states of transition when the last secret tear of one's soul is bitterly swallowed, and the crisis passes.\n\nWith the destruction of the reactionary Kolchakist government, I feel that the time is right to pass on the responsibility of the chairmanship to another. As time has passed, I have found that my time is not spent bettering the lives of the workers, but instead engaging in politics. Politics of betrayal, scheming, and all of the things that are poisonous to the soul. I have no wish to die in office. Thus, I leave the choice of my successor to the assembled members of the Supreme Soviet.\n\nSigned,\nNikolai Ivanovich Bukharin"
 soviet_union.50.a:0 "We will miss you, comrade!"
 
 soviet_union.100.title:0 "Cold Pursuit"
 soviet_union.100.desc:0 "The frigid air hung heavy over the compound as the guards patrolled the premises, their breath crystallizing in the wintry night. Little did they know that within the confines of the once-imposing house arrest, a daring escape had taken place.\n\nIt was in the early hours of dawn when the guards discovered the empty rooms, their eyes widening with disbelief. Panic gripped their hearts as they combed every inch of the estate, hoping to uncover a trace of their former wards. Whispers of their escape permeated the air, spreading like wildfire among the ranks.\n\nAs the news reached the higher echelons of power, fear mingled with fury. How? How could this have happened? Who helped them?\n\nIn the shadows, the young escapees forged a path towards an uncertain future, their spirits aflame with the hope of freedom and the belief that their stolen lives could be reclaimed. Their audacious flight sent shockwaves through a nation, forever etching their names into the annals of history."
 soviet_union.100.a:0 "Damn it all."
 
 ### Congress ###
 sov_congress.1.title:0 "The Opening of the Congress"
 sov_congress.1.desc:0 "In a charged and solemn atmosphere, the Congress of Soviets convenes in Moscow for one of the most consequential sessions in recent memory. Delegates from across the republic - workers, peasants, soldiers, and party officials - gather beneath the red banners of revolution, their faces marked by the weight of crisis and expectation. The task before them is clear: to elect a new Chairman and chart the republic's course through deepening uncertainty.\n\nThe congress opens with a series of addresses, each reflecting the fractures within the body. Some delegates call for bold reform, others for discipline and order, while a growing number express frustration with the stagnation of leadership and party infighting. Behind the scenes, factions maneuver and whisper - Left and Right Oppositionists, party loyalists, and Red Army delegates each hoping to sway the vote in their favor.\n\nA large portrait of Comrade Lenin hangs over the dais, a silent reminder of the revolutionary ideals they all struggle to uphold. The atmosphere is tense, but electric; everyone present understands the stakes. Deputy Chairman Valery Mezhlauk gavels the session open, declaring: \"Comrades, we meet not in comfort but in duty - to decide who shall lead us in these trying times. Let this Congress speak with clarity, with resolve, and above all, with fidelity to the workers and peasants of our republic.\"\n\nAs nominations begin, the hall buzzes with anticipation; some names are met with cheers, others with murmurs or stony silence. Outside, workers and soldiers gather in the Red Square, eager for news of the outcome, sensing that a new chapter in the revolution may be about to begin.\n\nThe future of the RSFSR now hangs on the outcome of the votes soon to be cast - an uncertain future, born not just of ideology, but of struggle, survival, and the enduring promise of the Soviet dream."
 sov_congress.1.a:0 "Comrades, one and all."
 SOV_congress_opens:0 "The two factions with the most influence at the end of the Congress will be afforded a chance at power."
 
 sov_congress.2.title:0 "The New Economic Policy"
 sov_congress.2.desc:0 "Of all the issues to be discussed, perhaps none is more contentious than that of the New Economic Policy. Instituted after the end of War Communism, it was at the time billed as a temporary measure, designed to build up the productive forces before a full transition to socialism was possible.\n\nThe Rightists have argued that the time is still not yet ripe to move away from the NEP. The new territories in Siberia have yet to go through the same stage of development that the rest of the country has, and the RSFSR as a whole can still hardly compete with the capitalist west.\n\nThe other factions are skeptical at best. The left factions offer the most vocal opposition, calling the NEP 'capitalism in disguise' and 'against the entire spirit of the revolution'. A centrally planned economy, they argue, would offer faster industrialization, as well as being more responsive to the needs of the population. Kamenev and his followers fall somewhere in the middle; while they oppose capitalist economics, they are not totally in favor of central planning either, preferring to promote a more cooperative system akin to the policies promoted by the SPA in the United States."
 sov_congress.2.a:0 "It has worked well so far."
 sov_congress.2.b:0 "Let us end this capitalist mistake."
 
 sov_congress.3.title:0 "The Responsible Secretary's Influence"
 sov_congress.3.desc:0 "The role of the party Secretary has admittedly been less of a hot-button issue, yet still an important one nonetheless. The office had been established back in 1919 primarily to hande administrative duties, but its responsibilities have grown significantly since then.\n\nProminent Centralists and Rightists have proposed that the Secretary be further empowered, allowing them to act as a check on a government that could stray from revolutionary ideals.\n\nThey are opposed by the Worker's Opposition, who see only a limited role for the party within the union-led system they wish to implement. The Democrats similarly oppose this view on the basis that a strong Secretary would squash the all-inclusive consensus they wish to build."
 sov_congress.3.a:0 "The Secretary must be able to steer the party in the proper direction."
 sov_congress.3.b:0 "He is there to manage, nothing more."
 
 sov_congress.4.title:0 "Principle and Practice"
 sov_congress.4.desc:0 "Where does one draw the line between legitimate debate and dissent that threatens unity? When does centralism slip into authoritarianism? The swirl of debate around the principle and implementation of Democratic Centralism has reached a fever pitch, and shows no signs of dying down.\n\nFactions have been officially banned since the Resolution on Party Unity was passed in 1921, but in practice they have continued to exist regardless.\n\nNow, a group of Democrats supported by the Syndicalists and Decists have put forth a new resolution calling to formally abolish the ban, citing Lenin's claim that it was never intended to be more than a temporary measure. The Centralists and Rightists have come out in force to oppose the measure; to them, all the crises of the past 15 years have been the symptoms of disunity, enabled by "
 sov_congress.4.a:0 "We need proper unity."
 sov_congress.4.b:0 "It's fine as it is!"
 sov_congress.4.c:0 "We can't let a small group dictate policy!"
 
 sov_congress.5.title:0 "Oversight of the Army"
 sov_congress.5.desc:0 ""
 sov_congress.5.a:0 "Strict oversight is warranted."
 sov_congress.5.b:0 "They would never act against the people!"
 
 sov_congress.6.title:0 "The Status of the Unions"
 sov_congress.6.desc:0 "Debates over the role of trade unions have dated back to the very earliest days of the revolution. Though the matter was settled by Lenin for a time, new arguments over their role in the economy have ground the Congress to a halt.\n\nRepresentatives of the Workers' Opposition, made up primarily of trade unionists, have argued vociferously in favor of granting local unions total control over the economy - a position decried as \"dangerously decentralist\" by the Centralists and Rightists."
 sov_congress.6.a:0 "We cannot allow bureaucrats to make economic decisions!"
 sov_congress.6.b:0 "What would they know of national economics?"
 
 sov_congress.7.title:0 "Our Foreign Policy"
 sov_congress.7.desc:0 ""
 sov_congress.7.a:0 "We need to focus on ourselves."
 sov_congress.7.b:0 "We shall carry the revolution to new heights!"
 
