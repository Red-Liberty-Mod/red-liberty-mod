 soviet_union.2.title:0 "A Scathing Editorial"
 soviet_union.2.desc:0 "In the corridors of the Kremlin, tension crackles like a live wire. The cause? An editorial, published anonymously in Pravda, takes direct aim at the Centralist faction, accusing them of rigid dogmatism and an inability to adapt to the ever-changing conditions of the revolution. It is a scathing critique, subtle in its wording but unmistakable in its target. Within hours, the Centralists are in an uproar, demanding to know who dared to launch such an attack in the party’s most prominent newspaper. Accusations fly, suspicions fester, and unity begins to fray.\n\nDays later, another editorial appears, just as sharp, just as anonymous, but now turning the attack against the critics of the Centralists. It mocks their supposed flexibility as mere opportunism, their adaptability as weakness, and their criticisms as the whining of those too undisciplined for real leadership. Now, the other factions - those who had quietly nodded along with the first editorial - find themselves under fire. Old grievances resurface, and party meetings devolve into bitter disputes, each side convinced that their rivals are conspiring against them."
 soviet_union.2.a:0 "In his office, Bukharin smiled."
