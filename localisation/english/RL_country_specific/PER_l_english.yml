 PER_british_monopoly:0 "British Monoploy"
 PER_british_monopoly_desc:0 "Following British reapproachment after the financial slump that impacted our over-reliant export based economy, Anglo-Persian Agreement was supposed to guarantee Persia's existence, British investment and trade with our markets. However, this has had unintentional consequences on our domestic industries, making us even more dependent on British loans to finance our bleeding coffers. Whilst many in our cabinet have vested interests in keeping this shaky balance of power in place due to financial incentives, we musn't let this bite us in the near future, and drafting contingency plans, as well as potentially taking a stance against the british magnates would send a sound message; business for the Persian working man, not the British usurper!"
