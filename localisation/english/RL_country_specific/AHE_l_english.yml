 AHE_crown_of_st_stephen:0 "Crown of St. Stephen"
 AHE_crown_of_st_stephen_desc:0 "As a co-equal Crown of the Empire, the Lands of the Crown of St. Stephen possess extensive autonomy. Coming just short of outright independence, the Kingdom of Hungary maintains its own government, finances, and military."
 
