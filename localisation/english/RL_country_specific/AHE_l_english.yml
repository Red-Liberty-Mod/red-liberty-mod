 AHE_incompetent_military:0 "Incompetent Military"
 AHE_incompetent_military_desc:0 "The Austro-Hungarian Empire has struggled for decades with military preparedness, with tactics remaining in the era of Napoleon rather than the modern day - worse still is the officer corps, in which oftentimes those with rank to hold charge do not command men that can understand their language. Strict centralisation and reform must be enacted before we can call ourselves a military power once again."
 AHE_doomed_empire:0 "A Doomed Empire"
 AHE_doomed_empire_desc:0 "As is common in any large Empire, certain ethnic and racial groups within our Empire have grown increasingly radical over the last few decades. The partial federalization of the Cisleithanian lands has done nothing to stem the tide of nationalism... it'll require nothing less than a miracle to save the Empire."
 AHE_german_dependence:0 "Dependence on German Finance"
 AHE_german_dependence_desc:0 "As Austria's economy collapsed post-war, German firms took advantage and moved into Austria to expand their business. As such, commodity prices and general economic health are heavily contingent on German corporations."
 AHE_inept_legislature:0 "Inept Legislature"
 AHE_inept_legislature_desc:0 "National courts and local governments have long been stacked with friendly representatives of whomever had been in control at the time, leading to incredibly loyal and friendly governing bodies, but one would be hard pressed to find any progress having been made in years. Thorough purges of the incompetent and a focus on anti-corruption are all that can solve this mess of an issue."
 
 AHE_beacon_of_hope:0 "Die Österreichische Revolution"
 AHE_beacon_of_hope_desc:0 "For centuries, Austria has been an Empire that oppressed its people and workers. With our rise, this ends now. Austria shall be a new nation of equals, no longer devastated by poor government policies."
 
 AHE_winter:0 "Winter"
 
 AHE_civil_war:0 "Civil War"
 
 ### Decisions ###
 AHE_saving_the_empire_category:0 "Saving the Empire"
 AHE_saving_the_empire_category_desc:0 "The empire is §Rfading fast§!. They say that we are doomed to collapse.\n\nThe Ethnicities are §Rdiscontent§!.\nThe Socialists are §Rradicalizing§!.\nThe Fascists\n\nThe Imperial Council is §Rhopelessly corrupt§!.\nThe K.K. Gendarmerie is §Rcompletely ineffective§!.\nGerman control over the economy is §Rabsolute§!.\n\nThe Ordnungsrecht has §Rstalled§!.\n\n§RThe empire is fading fast§!."
 
 AHE_austrian_revolution_category:0 "The Austrian Revolution"
 
