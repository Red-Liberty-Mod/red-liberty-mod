 POLITICS_9TH_PANCHEN_LAMA_DESC:0 "§YBorn:§! §LFebruary 19th, 1883, in Dagpo, Tibet, Qing Empire§!\n§YBackground:§! Born into a respected religious family in Tsang, Thubten Chökyi Nyima was recognized early for both his spiritual aptitude and his uncommon interest in worldly affairs. From the outset of his monastic education, he showed a marked fascination with administration, law, and history, subjects traditionally regarded as secondary to ritual and philosophy."
 
