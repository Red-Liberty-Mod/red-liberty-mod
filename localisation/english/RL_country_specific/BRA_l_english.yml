 BRA_progressive_liberalism_party_long:0 "Partidos Liberais\n§gUnlike in other countries, there is no united "Liberal Party" at the federal level. As a result of Brazil's intense decentralization, most political parties only exist at a state level. As a result of the Revolution of 1930, the old oligarchic order was broken, offering the chance for new liberal parties to form.§!"
