 ### Events ###
 brazil.6.title:0 "Palace Coup!"
 brazil.6.desc:0 "Inside the grand halls of the Catete Palace, tension thickens as democratic forces, led by high-ranking government officials and military officers, quietly move through the corridors. Under cover of night, they surround the private quarters of President Getúlio Vargas, who remains unaware that his most trusted allies have turned against him. Outside, Rio de Janeiro is already a city at war, with the streets alive with the sounds of gunfire and explosions from the ongoing civil conflict tearing the country apart.\n\nThe palace, usually a symbol of Vargas's unshakable authority, is now a center of betrayal as democratic loyalists quietly take control, securing strategic rooms and disarming the palace guards loyal to the President. With the coup’s leaders assembled, they signal to the officers who surround Vargas’s office to advance. In a tense confrontation, they present him with a choice: surrender power in favor of a provisional democratic government, or face immediate detention.\n\nVargas, realizing the depth of his isolation, reluctantly agrees, eyes dark with a mix of resignation and bitterness. Within hours, the democratic forces issue an announcement over the radio: the authoritarian regime has been overthrown, and Brazil will soon be led by a new coalition aimed at restoring democratic governance. In the streets, news of the palace coup spreads rapidly, igniting a mixture of jubilation, skepticism, and apprehension among the war-weary populace.\n\nAs dawn breaks, the palace stands under a new flag, signaling the promise of democracy even as the civil war rages on."
 brazil.6.a:0 ""
 
 brazil.7.title:0 "The New State"
 brazil.7.desc:0 "Amidst the turmoil of civil war, Getúlio Vargas makes a bold, decisive move that shocks both allies and enemies alike. From his office in the Catete Palace, he issues a sudden, sweeping proclamation that dissolves Brazil’s parliament and suspends the constitution. His voice, calm yet commanding, echoes over the national radio as he declares himself the ultimate authority in Brazil, vowing to restore order and unity under his sole rule.\n\nOutside, soldiers loyal to Vargas fan out across Rio de Janeiro, occupying government offices, shutting down opposition newspapers, and arresting key democratic leaders. Military trucks roll down the cobblestone streets, enforcing a strict curfew, while the palace itself transforms into a fortress under heavy guard. Vargas’s paramilitary supporters, the feared Black Eagles, patrol the streets, making it clear that resistance will not be tolerated.\n\nThe reaction across the country is immediate and fierce. In the rebel-held regions, opposition leaders condemn Vargas's "self-coup," rallying their forces and calling for an intensified struggle against his authoritarian grip. In the capital, a tense silence blankets the streets as people tune in to secret radios, trying to make sense of what the next day will bring.\n\nInside the palace, Vargas meets with his inner circle, his advisors and generals exchanging wary glances, aware that this move could either cement his control or spark a greater rebellion. Determined, Vargas rises and issues his final command for the evening, declaring, "This nation needs unity, and I alone will provide it." With that, the doors of the palace close, sealing Brazil’s fate in the hands of one man, even as the country teeters on the edge of chaos."
 brazil.7.a:0 ""
 
 brazil.8.title:0 "Greenshirt Coup!"
 brazil.8.desc:0 "In the heart of [BRA.capital.GetName], gunfire echoes through the streets as members of the Brazilian Integralist Action launch a coup against the embattled government of Getúlio Vargas. Armed with foreign rifles and a fervent ideological zeal, they march through the city, banners bearing the green sigma fluttering behind them. The once-stronghold of Vargas' regime is now a battlefield as Integralist forces seize government buildings, taking advantage of the chaos of the ongoing civil war.\n\nAcross the city, streets fill with both Integralist and loyalist militias clashing in brutal close-quarters combat, while civilians scatter to seek cover. Within the presidential palace, a handful of Vargas’s remaining guards desperately attempt to hold their ground, even as they’re gradually overwhelmed by the disciplined ranks of Greenshirt soldiers.\n\nIn neighborhoods aligned with the revolutionaries, members of the Integralist Action rally supporters to their cause, proclaiming their vision of a "New Brazil" — a unified, authoritarian state cleansed of communism and liberalism. Across the radios, the voice of Plínio Salgado declares the beginning of a new era, calling on all "true patriots" to join them in dismantling the remnants of the Vargas government. As night falls, the city remains a battleground, while the future of Brazil hangs in the balance."
 brazil.8.a:0 ""
 
