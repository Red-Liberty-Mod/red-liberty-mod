 BRA_national_conservatism_party_long:0 "Partidos Republicanos\n§gUnlike in other countries, there is no united \"Republican Party\" at the federal level. As a result of Brazil's intense decentralization, most political parties only exist at a state level. The most influential of these parties is the Paulista Republican Party, which governed the country alongside the Republican Party of Minas Gerais during the oligarchic 'Coffee with Milk' period. With the Revolution of 1930, the strength of these parties has significantly contracted, and their continued existence is uncertain.§!"
