 bukhara_skeleton.2.title:0 "Bukharan Revolutionaries Plead for Aid!"
 bukhara_skeleton.2.desc:0 "We have recieved reports that Bukharan revolutionaries, inspired by news of the Red Army's march down the Syr Darya, have overthrown their hated Emir! Now, surrounded on all sides, they beg us for aid in the fight against the tsarists."
 bukhara_skeleton.2.a:0 "Hold fast, comrades!"
 
