 ### EVENTS ###
 us_election.1.title:0 "Election Day"
 us_election.1.desc:0 "Today's the day! Americans everywhere are going down to their polling places, casting their votes for who will be the next President of the United States. It'll take a few days to collect and count the results, at which point a victor will likely be declared."
 us_election.1.a:0 "The anticipation!"
 
 us_election.2.title:0 "The Results"
 us_election.2.desc:0 "The final votes have been counted, and the results are in:\n\nThe Socialist Party recieved [?socialist_electoral_votes] electoral votes.\n\nThe Democratic Party recieved [?democrat_electoral_votes] electoral votes."
 us_election.2.a:0 "No Majority!"
 us_election.2.b:0 "Thomas wins again!"
 us_election.2.c:0 "Lister wins the election!"
 
 us_election.3.title:0 ""
 us_election.3.desc:0 ""
 us_election.3.a:0 ""
 
 us_election.4.desc:0 "With the recent election being split four ways, it is perhaps unsurprising that no one candidate would secure the needed electoral votes to claim victory. Now it falls to the House of Representatives to decide which candidate had the most solid claim, which in practical terms means that the party that influences the most states will probably win, as only one representative per state is allowed to vote."
 us_election.4.a:0 "The House votes for Thomas."
 us_election.4.b:0 "The House votes for Lister."
 us_election.4.c:0 "The House votes for Lindbergh."
 
 us_election.5.title:0 "Inuaguration Day"
 us_election.5.desc:0 "The president-elect stood before a massive, cheering crowd on the Washington Mall. His hands rested easily on the podium; this is, after all, his second time up here. “Ladies and gentlemen!” He announces into the microphone, silencing the rapturous applause that had heralded his ascent.\n\n“I stand before you today humbled and grateful. Humbled by the many millions that have pledged their support to me, and to the Socialist Party and all of its candidates. And I am grateful for the providence of our Lord, who has shown me the way here.”\n\nHe paused for a moment, letting the cacophonous applause wash over him and up the steps of the Capitol. He didn’t turn around, but he smiled at the thought of the legislators behind him hearing the thunderous approval from the crowd. It would cow them; send them a message that the socialists were here to stay, and beloved by the people.\n\nHis eyes wandered over the assembled masses. Some were holding flags and banners; mostly for the Socialist Party, but there were a few from the Socialist Labor Party, the Farmer-Labor Party, the Progressive Party, and Communist Party. He tacitly disapproved of the final one but had avoided disavowing them while on the campaign trail. If they would support him, then he would let them, but he sure as hell wasn’t going to give them anything for it.\n\nThe unions were out in force too. The American Federation of Labor was, of course, present, as was the redoubtable Industrial Workers of the World, with their red and black banners, and there was even a single banner for the infirm and aging Knights of Labor.\n\nParties and unions; they’d all been fighting decades for this, for a time when one of their own could sit in the White House. Debs had been a monumental victory, as had his reelection. But Thomas was a victory too. He was a statement, the socialists would not burn hot and short but were here to stay."
 us_election.5.a:0 "I, Norman Matoon Thomas..."
 
 us_election.7.title:0 "Inuaguration Day"
 us_election.7.desc:0 ""
 us_election.7.a:0 "I, Joseph Lister Hill..."
 
