 us_election_trigger.8.title:0 "Election Season Ends"
 us_election_trigger.8.desc:0 "The ballots have been cast, the winners celebrate, and the loosers sulk and scheme and ready their plans for next time. Election season has come to a close, and as the campaigns wind down and people return to the regular rhythms of life, Americans everywhere congratulate themselves on doing their part to maintain the world's greatest republic."
 us_election_trigger.8.a:0 "Until next time!"
 
