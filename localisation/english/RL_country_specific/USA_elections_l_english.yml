 USA_campaign_in_new_england:0 "Campaign in New England"
 USA_campaign_in_new_england_desc:0 "Among the many old towns and wild forests, the voters of New England tend to be very diverse electorally. Many areas remain Republican strongholds, such as Maine and Vermont, while Massachusetts and Rhode Island tend towards either the Democratic or Socialist parties. Most urban centers in New England are friendly towards the Socialist Party, but many of the surrounding areas and bourgeois areas come out against the Socialists in huge numbers."
