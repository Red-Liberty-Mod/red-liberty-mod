 us_election.20.desc:0 "Today's the day! Americans everywhere are going down to their polling places, casting their votes for who will be the next President of the United States. It'll take a few days to collect and count the results, at which point a victor will likely be declared."
 us_election.20.a:0 "The anticipation!"
 
 us_election.21.title:0 "The Results"
 us_election.21.desc:0 "The final votes have been counted, and the results are in:\n\nThe Socialist Party recieved [?socialist_electoral_votes] electoral votes.\n\nThe Democratic Party recieved [?democrat_electoral_votes] electoral votes."
 us_election.21.a:0 "An unprecedented third term!"
 us_election.21.b:0 "Hull claims victory!"
 
 us_election.22.title:0 "Thomas' Third Inuaguration"
 us_election.22.desc:0 "As he took the oath of office for the third time, Thomas reflected on the challenges and triumphs of his first two terms, and looked ahead to the work that lay before him.\n\nIn his private reflections, Thomas felt both pride and weariness. He was proud of the progress that had been made under his leadership, from the establishment of the Department of Common Education to the passage of the Social Security Act. But he was also keenly aware of the challenges that still remained, from the ongoing threat of war in Europe to the deepening divisions within his own country.\n\nAs he stood before the crowd gathered on the steps of the Capitol, Thomas felt a sense of responsibility weighing heavily on his shoulders. He knew that the decisions he made in the coming years would have far-reaching consequences for the American people, and he was determined to lead with integrity, compassion, and wisdom.\n\nDespite the gravity of the moment, Thomas could not help but feel a sense of optimism as well. He believed in the resilience and strength of the American people, and was confident that they would rise to meet the challenges of the times. As he concluded his inaugural address, he felt a renewed sense of purpose and determination, knowing that he had the support of millions of Americans behind him as he embarked on his third term as President."
 us_election.22.a:0 "'My fellow Americans...'"
 
 ### GENERIC EVENTS ###
 
 us_campaign.1.title:0 "Great Campaign!"
 us_campaign.1.desc:0 "Throughout the course of American history there have been few political events to match that of our candidates' most recent rally! The crowd was alight with both patriotism and zealous support towards both our party and the future of the nation under our administration. Our candidate will leave the region knowing full well the support at their back."
 us_campaign.1.a:0 "Brilliant!"
 
 us_campaign.2.title:0 "Good Campaign."
 us_campaign.2.desc:0 "Today’s address was well received by our gathered supporters, and our candidate spoke with a passion and knowledge which clearly resonated with the audience. Reporters present wrote later about the fine way our candidate presented himself and the party, and we can be proud of this fine step in our campaign."
 us_campaign.2.a:0 "Splendid."
 
 us_campaign.3.title:0 "Middling Campaign."
 us_campaign.3.desc:0 "It’s only natural that certain parts of the campaign trail will be considered filler to the history books, even campaigns as contentious and important as the one we currently face and yet our most recent rally was simply that; uneventful filler. It is unlikely anyone was swayed in one way or another, but it cannot be denied that our candidates’ face being shown was positive. Let us hope for a greater result in the future."
 us_campaign.3.a:0 "Not great, not terrible."
 
 us_campaign.4.title:0 "Bad Campaign!"
 us_campaign.4.desc:0 "Rarely is it said that a single speech could tank the performance of a candidate, let alone an entire party, throughout a region - and yet rarities do seem to happen, as they have on this occasion. Our candidate, in a single instance, has managed to erode most of their support within multiple states and amongst many constituents, hopefully they are able to recover from this debacle."
 us_campaign.4.a:0 "Heads will roll!"
 
 us_campaign.5.title:0 "Stellar Opposition Campaign!"
 us_campaign.5.desc:0 ""
 us_campaign.5.a:0 "Well, he was convincing."
 
 us_campaign.6.title:0 "Good Opposition Campaign."
 us_campaign.6.desc:0 ""
 us_campaign.6.a:0 ""
 
 us_campaign.7.title:0 "Decent Opposition Campaign."
 us_campaign.7.desc:0 ""
 us_campaign.7.a:0 "As expected."
 
 us_campaign.8.title:0 "Terrible Opposition Campaign."
 us_campaign.8.desc:0 "What had been expected to be a normal rally by our opposition turned out to be... not so. After ascending to the podium, our opponents' candidate proceeded to give a bizarre, meandering speech resulting in confusion at best, and outrage at worst. Polling numbers have fallen across the entire region, and it is uncertain that the damage to their reputation can be recovered from."
 us_campaign.8.a:0 "What could he have meant by that?"
 
 us_election_trigger.1.title:0 "Class I Elections"
 us_election_trigger.1.desc:0 "Election season has once again descended on America. In cities big and small, party headquarters are opening up, posters are being plastered on every open surface, speeches are being given, and donations big and small are being solicited. The grand United States tradition of beer, brawls, and ballots is underway, and whatever result it produces, no matter how maddening, will be accepted as legitimate, as benefits the greatest republic in the history of the world."
 us_election_trigger.1.a:0 "Don't become deluded by reaction! Vote Socialist!"
 us_election_trigger.1.b:0 "Protect our American way of life! Vote Democrat!"
 
 us_election_trigger.3.title:0 "Class II Elections"
 us_election_trigger.3.desc:0 "Election season has once again descended on America. In cities big and small, party headquarters are opening up, posters are being plastered on every open surface, speeches are being given, and donations big and small are being solicited. The grand United States tradition of beer, brawls, and ballots is underway, and whatever result it produces, no matter how maddening, will be accepted as legitimate, as benefits the greatest republic in the history of the world."
 us_election_trigger.3.a:0 "You have nothing to loose but your chains! Vote Socialist!"
 us_election_trigger.3.b:0 "Vote Democrat!"
 
 us_election_trigger.6.title:0 "Class III Elections"
 us_election_trigger.6.desc:0 "Election season has once again descended on America. In cities big and small, party headquarters are opening up, posters are being plastered on every open surface, speeches are being given, and donations big and small are being solicited. The grand United States tradition of beer, brawls, and ballots is underway, and whatever result it produces, no matter how maddening, will be accepted as legitimate, as benefits the greatest republic in the history of the world."
 us_election_trigger.6.a:0 "Power to the People! Vote Socialist!"
 us_election_trigger.6.b:0 "Vote Democrat!"
 
