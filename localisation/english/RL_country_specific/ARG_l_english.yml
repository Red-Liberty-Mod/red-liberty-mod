 ### Decisions ###
 ARG_territorial_nationalism_category:0 "Territorial Nationalism"
 ARG_territorial_nationalism_category_desc:0 "Within the nationalist sphere, the theory of "Territorial Nationalism" has been popularized by the writings of §YJoaquín Víctor González§! and §YErnesto Ángel Quesada§!. The theory goes that countries like Chile, Peru, and Uruguay owe their independence to Argentina, and have at best shown ingratitude for such a gift. Therefore, in order to restore a 'Great Argentina' the borders of the former Viceroyalty of the Río de la Plata, whether through diplomacy or conquest, must be retaken."
