 ARG_anarchism_party:0 "FACA"
 ARG_anarchism_party_long:0 "Federación Anarco-Comunista Argentina"
 ARG_vanguard_socialism_party:0 "PCA"
 ARG_vanguard_socialism_party_long:0 "Partido Comunista de la Argentina"
 ARG_revolutionary_socialism_party:0 "PCA"
 ARG_revolutionary_socialism_party_long:0 "Partido Comunista de la Argentina"
 ARG_democratic_socialism_party:0 "PS"
 ARG_democratic_socialism_party_long:0 "Partido Socialista\n§gFounded in 1896 by Nicolás Repetto, the Socialist Party was the first mass party in the Argentine political sphere. Since its foundation, the party has found itself usually coming in third or fourth place in national elections. The party performed well in the 1928 elections (despite splitters breaking away to form the PSI in 1927), but found itself soon marginalized by the authoritarian governments of Uriburu and Pedro Justo.§!"
 ARG_social_democracy_party:0 "PDP"
 ARG_social_democracy_party_long:0 "Partido Demócrata Progresista"
 ARG_progressive_liberalism_party:0 "UCR"
 ARG_progressive_liberalism_party_long:0 "Unión Cívica Radical\n§gThe Radical Civic Union was founded in 1891 to oppose the oligarchy that had ruled Argentina since 1874. Leading two revolutions in 1893 and 1905, the party finally came to power with the collapse of the National Autonomist Party in 1916. For much of its time in power, the UCR has been led by Hipólito Yrigoyen, who despite his relative popularity failed to retain control of the military, which removed him from power in 1930 on charges of 'personalism'. The party itself nearly collapsed in the wake of the coup, with countless state affiliates splitting off from the national party. Since Yrigoyen's death in 1933, the party has been led by Marcelo Torcuato de Alvear, who has reunited many of the splinters back into the party, and negotiated an end to the UCR's repression by the government.§!"
 ARG_liberal_conservatism_party:0 "PDN"
 ARG_liberal_conservatism_party_long:0 "Partido Demócrata Nacional\n§gThe National Democratic Party is a conservative liberal party founded in 1931, after the overthrow of president Hipólito Yrigoyen. Considered the successor to the National Autonomist Party which ruled Argentina during the oligarchic period from 1874-1916, the party quickly joined with the UCR-A and PSI to form the Concordance, the coalition of parties that now rules Argentina.§!"
 ARG_national_conservatism_party:0 "PSI"
 ARG_national_conservatism_party_long:0 "Partido Socialista Independiente\n§gThe Independent Socialist Party was formed in 1927 by anti-Yrigoyen dissidents from the PS. While the party originally emerged as a left-wing force, its participation in the Concordancia has forced it to adopt a more conservative and economically nationalist platform. The death of its leader Antonio de Tomaso has led to the party's slow disintegration over the past several years, and it seems unlikely to survive another election.§!"
 ARG_authoritarian_democracy_party:0 "UCR-A"
 ARG_authoritarian_democracy_party_long:0 "Unión Cívica Radical Antipersonalista\n§gThe Antipersonalist Radical Civic Union is a split-off from the UCR, founded by members who opposed the 'personalism' of Hipólito Yrigoyen. Founded in 1924, the party supported the coup which deposed Yrigoyen in 1931, after which they joined with the PDN and PSI to form the Concordance, the coalition of parties that now rules Argentina.§!"
 ARG_despotism_party:0 "Liberalistas"
 ARG_despotism_party_long:0 "Junta Militar - Liberalistas\n§gUnlike what their name would imply, the \"Liberal\" faction of the Argentine military should not be misunderstood as supportive of democracy. Their primary objective is to maintain the military's autonomy from the government, and they will lend their support to whomever can assure that status quo.§!"
 ARG_ultraconservatism_party:0 "Nacionalistas"
 ARG_ultraconservatism_party_long:0 "Junta Militar - Nacionalistas\n§gThe \"Nationalist\" faction of the military represents groups of radical officers with strong nationalist and corporatist ideas, as well as a strictly neutral approach to foreign policy. It was a member of this faction, José Félix Uriburu, that led the coup that removed President Yrigoyen from office in 1930. Despising liberal democracy, its members view the military as the only potential saviour of the country.§!"
 ARG_fascism_party:0 "LPA"
 ARG_fascism_party_long:0 "Liga Patriótica Argentina"
 
 ARG_officer_group_party:0 "Nacionalistas - GOU"
 ARG_officer_group_party_long:0 "Grupo de Oficiales Unidos\n§gFormed by radicals belonging to the Nationalist faction of the Argentine military, the Group of United Officers is a highly nationalist and militarist organization, seeking to oppose communism and uphold neutrality by any means necessary.§!\n"
 
 ARG_nationalist_alliance_party:0 "ALN"
 ARG_nationalist_alliance_party_long:0 "Alianza Libertadora Nacionalista"
 
 ### Ideas ###
 ARG_starting_the_year:0 "Starting the Year"
 ARG_british_monopoly:0 "British Monopoly"
 ARG_british_monopoly_desc:0 "Following British reapproachment after the financial slump that impacted our over-reliant export based economy, the Roca-Runciman Agreement was supposed to guarantee British investment and trade with our markets. However, this has had unintentional consequences on our domestic industries, making us even more dependent on British loans to finance our bleeding coffers. Whilst many in our cabinet have vested interests in keeping this shaky balance of power in place due to financial incentives, we musn't let this bite us in the near future, and drafting contingency plans, as well as potentially taking a stance against the british magnates would send a sound message: business for the Argentinean working man, not the British usurper!"
 ARG_crippled_industry:0 "Crippled Industry"
 ARG_crippled_industry_desc:0 "Although we are famed for many things, industrial capacity is not one of them, largely thanks to the complacency of the aristocrats in Buenos Aires, who during the 19th and early 20th centuries did not view the need to expand industries when cattle farms and plantations were innumerably profitable. This fact has become more and more apparent as the world economy begins to depend less on these meager returns. If we wish to remain the prime exporter of Latin America, we must shift attention to raw material goods, and to diversify our primary sector, with mass scale drives in industrial commerce to modernise Argentina, truly bringing us into the 20th century"
 ARG_brazilian_immigrants:0 "Brazilian Refugees"
 ARG_brazilian_immigrants_desc:0 "With the policies  of the Argentine state always having been attractive to foreign migrant workers, this has also attracted one of the main rivals in our vicinity, with Brazilian business men and financiers alike especially viewing Argentina as a safe haven for them. As Brazil is itself engulfed in its own civil conflict, the regions of Misiones and Corrientes, both once competed over by Paraguayan revanchists, who both we and the Brazilians thwarted, now stands as the go-to hub for the incoming Brazilian diaspora. Perhaps we can use this to our advantage, by appropriating their skills for the improvement of these hinterlands to be entrepenural power houses."
 
