 ### Ideas ###
 COL_legacy_bolivar:0 "Legacy of Bolivar"
 COL_legacy_bolivar_desc:0 "The center of the Bolivarian revolution, the Bolivar republic of Colombia has been gutted from it's own destiny to rival the North Americans and European imperialists abroad, with the internal disorder caused by bickering administrators outside Bogota succumbing to the wills of political independence, with the final national concession of Panama forcibly sponsored by the Americans sealing our fate as another south American state. Many however, especially within the military echelons, seek to dispute this notion at all, contending that Colombia is destined to carry the mantle of Bolivar in the 21st century, either through diplomatic racketeering, or through a show of force."
 COL_memories_of_28:0 "Memories of '28"
 COL_memories_of_28_desc:0 "In December of 1928, banana plantation workers in the town of Ciénaga went on strike, hoping that the United Fruit Company for which they worked would reach an agreement with them. All they asked for was for the company to grant them dignified working conditions. Instead, they were massacred by the thousands. The 'Banana Massacre', as it has come to be known, deeply radicalized the Socialist Party, causing a crisis that eventually led to its reformation into the Colombian Communist Party."
 COL_revolution_on_the_march:0 "Revolution on the March"
 COL_revolution_on_the_march_desc:0 "President Pumarejo's 'Revolution on the March' is a series of sweeping refoms aiming to modernize the country through social and economic reform. From labor policy to women's rights, no part of Colombian society is to be left untouched.\n\nPumarejo has been able to pass this agenda in no small part due to the Conservative Party's decision to abstain from elections, giving the Liberals complete control of the government. Though this has not stopped them from fervently criticizing every action the government takes."
 