 USA_anarchism_party:0 "CPUSA"
 USA_anarchism_party_long:0 "Communist Party of the United States of America"
 USA_vanguard_socialism_party:0 "CPUSA"
 USA_vanguard_socialism_party_long:0 "Communist Party of the United States of America"
 USA_revolutionary_socialism_party:0 "SPA - Left"
 USA_revolutionary_socialism_party_long:0 "Socialist Party of America\n§gThe Left Wing of the SPA unites hardline marxists, syndicalists, and a scant few christian socialists, who believe in socialism advanced primarily by direct action. This should not be misconstrued as by violent revolution necessarily, as many within the faction take it to mean supporting strike action and the construction of mutual aid networks.§!"
 USA_democratic_socialism_party:0 "SPA - Center"
 USA_democratic_socialism_party_long:0 "Socialist Party of America\n§gThe Center Wing of the SPA brings together christian socialists, centrist marxists, and immigrant groups, who maintain that there can be an ideal balance between electoralism and direct action for the construction of socialism in America. Though this stance earns them as much ire as praise, it has allowed them to bridge the ideological gap between factions, holding the party together through tumultuous times.§!"
 USA_social_democracy_party:0 "SPA - Right"
 USA_social_democracy_party_long:0 "Socialist Party of America\n§gThe Right Wing of the SPA is composed of reformist marxists, social democrats, and left-wing populists that believe that socialism can and should be achieved through the ballot box. This pure electoralism often puts them at odds with the more radical elements of the party, bringing accusations of having capitulated to the bourgeosie class.§!"
 USA_progressive_liberalism_party:0 "DP - Reformist"
 USA_progressive_liberalism_party_long:0 "Democratic Party\n§gThe Reformist Wing of the Democrats.§!"
 USA_liberal_conservatism_party:0 "RP - Establishment"
 USA_liberal_conservatism_party_long:0 "Republican Party"
 USA_national_conservatism_party:0 "DP - Conservative"
 USA_national_conservatism_party_long:0 "Democratic Party\n§gThe Conservative Wing of the Democrats.§!"
 USA_authoritarian_democracy_party:0 "CWP - Moderate"
 USA_authoritarian_democracy_party_long:0 "Commonwealth Party"
 USA_despotism_party:0 "Armed Forces"
 USA_despotism_party_long:0 "Armed Forces\n§gThere are some in the armed forces who have expressed disloyal attitudes towards the government and its accomodation of socialist ideas. Their influence is negligible, however.§!"
 USA_ultraconservatism_party:0 "CWP - Radical"
 USA_ultraconservatism_party_long:0 "Commonwealth Party"
 USA_fascism_party:0 "CP"
 USA_fascism_party_long:0 "Christian Party\n§gThe Christian Party, founded August 16th, 1935, operates a little more than the political wing of William Pelley's paramilitary organization; the Silver Legion of America. Inspired by fascist movements abroad, Pelley's goal is to bring about a 'spiritual and political renewal' of American society through the establishment of a fascist dictatorship. Pelley is regarded as little more than a nutjob, and it would take a miracle for him to get anywhere near the levers of power.§!"
 
 ## SPA Factions ##
 USA_spa_marxist_party:0 "SPA - Marxist"
 USA_spa_marxist_party_long:0 "$USA_revolutionary_socialism_party_long$\n\n§gThe \"Marxist\" faction of the SPA.§!"
 USA_spa_syndicalist_party:0 "SPA - Syndicalist"
 USA_spa_syndicalist_party_long:0 "$USA_revolutionary_socialism_party_long$\n\n§gThe \"Syndicalist\" faction of the SPA is composed mainly members of the former Socialist Labor Party. They promote the creation of a \"labor amendment\" to the constitution.§!"
 USA_spa_constructive_party:0 "SPA - Constructive"
 USA_spa_constructive_party_long:0 "$USA_revolutionary_socialism_party_long$\n\n§gThe \"Constructive\" faction of the SPA prioritizes practical reforms that directly impact the lives of workers.§!"
 
