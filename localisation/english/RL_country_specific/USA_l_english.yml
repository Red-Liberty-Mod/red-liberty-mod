 ### CHARACTERS ###
 ## Leaders ##
 USA_norman_thomas:0 "Norman Thomas"
 POLITICS_NORMAN_THOMAS_DESC:0 "§YBorn:§! §LNovember 20th, 1884, in Marion, Ohio, United States§!\n§YBackground:§! A Princeton graduate and Presbyterian minister, Norman Thomas made his first impression in politics with his pacifist, anti-war activism during the Great War, a position that drew him to the Socialist Party of America, who had delivered on their promises to keep America out of it. He gained popularity as an SPA journalist and was elected governor of New York in 1924. When Eugene V. Debs died in 1926, Thomas became the new head of the party as its leading non-immigrant member. He lost his first bid for president to Herbert Hoover in 1928, but after the Stock Market crash in 1929, Hoover’s popularity plummeted, and in 1932 President Norman Thomas and the SPA won the Presidency in a landslide.\n\nFor all of his term, Norman Thomas has set about fixing the Great Depression with large amounts of government spending, public works projects, bureaucratic expansion, and worker-led recovery efforts. His recovery policies have been hindered and watered down by political resistance from the center and right wing, but where they have been enacted, have been both successful and popular."

 USA_james_maurer:0 "James Hudson Maurer"
 POLITICS_JAMES_MAURER_DESC:0 "§YBorn:§! §LApril 15th, 1864, in Reading, Pennsylvania, United States§!\n§YBackground:§! §LJames Hudson Maurer's journey from poverty to political prominence is indeed remarkable. Born into a struggling Pennsylvanian family of German immigrants, Maurer's early life was marked by hardship as he started working in a factory at just 10 years old to support his family after his father's passing from smallpox. This early experience deeply influenced his political beliefs, leading him to align with the populist labor organization, the Knights of Labor, where he immersed himself in economic literature and advocacy for the working class.\n\nDuring the early 20th century, Maurer found himself on the side of the unions during a split within the socialist movement. His advocacy for working-class interests propelled him to success, winning multiple elections to the House of Representatives in 1910, 1912, and 1914. Although he briefly lost in 1916, his consistent victories caught the attention of prominent socialist leader Norman Thomas, who supported Maurer as Speaker of the House.\n\nNow, as Maurer stands at such significant heights within the Socialist Party, the question arises; will he continue his ascent to potentially become the next leader after Thomas, or will he remain dedicated to his role as a steadfast advocate for labor rights within the House? Only time will reveal Maurer's next steps on his political journey.§!"

 USA_earl_russell_browder:0 "Earl Russell Browder"
 POLITICS_EARL_BROWDER_DESC:0 "§YBorn:§! §LMay 20th, 1891, in Wichita, Kansas, United States§!"
 USA_earl_browder_hog_desc:0 "§YBorn:§! §LMay 20th, 1891, in Wichita, Kansas, United States§!"

 USA_jack_reed:0 "John Silas Reed"
 POLITICS_JACK_REED_DESC:0 "§YBorn:§! §LOctober 22nd, 1887, in Portland, Oregon, United States§!\n§YBackground:§! §LJohn Silas Reed, affectionately known as "Jack" to his friends, defies the stereotype of a typical hardcore socialist. Born into privilege in his grandparents' mansion in Portland, Oregon, Reed's rebellious nature led to conflicts with his family and potential connections with business elites who disapproved of his writings for newspapers like the American Magazine, causing significant mental strain in his youth.\n\nHowever, Reed's career as a journalist skyrocketed after he arrived in New York. He fearlessly covered events like the Paterson Strike, ventured to Mexico during the Civil War, and reported on the European and Russian fronts of World War I with vivid detail, despite being a pacifist. His book "One Hundred Days That Shook the World," chronicling the first 100 days of the Debs presidency, became a landmark piece of literature in the early 20th century.\n\nNow serving as Vice President in the Thomas administration, Reed's socialism is aligned with Nikolai Bukharin's, whom he befriended during the Russian Civil War. He even established a Bukharinist wing within the party. While his actions and writings have garnered both friends and foes, Reed remains an iconic figure - an idealistic yet daring individual in a landscape often marked by political caution.§!"
 USA_jack_reed_hog_desc:0 "$POLITICS_JACK_REED_DESC$"

