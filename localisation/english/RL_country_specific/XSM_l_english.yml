 XSM_xibei_san_ma:0 "Three Horses of the Northwest"
 XSM_xibei_san_ma_desc:0 "The Ma 'Clique' is, in fact, the combined territories of multiple seperate cliques, all controlled by the same family, with the governships of Ningxia, Gansu, and Qinghai forming the core of their powerbase. Civilian and military positions are further stacked with extended members of the family. This combination of family dynamics with political manuevering unfortunately does little for political and military cohesion."
 XSM_overstretched_army:0 "Overstretched Army"
 XSM_overstretched_army_desc:0 "The Ma armies have never been particularly large, instead focusing on a core force of elite cavalry. The recent occupation of Inner Mongolia, however, has left military resources and personnel stretched thin; either the army will have to be expanded, or the Clique may find itself pushed out of the region."
 
