 GUI_wang_wenhua:0 "Wang Wenhua"
 POLITICS_WANG_WENHUA_DESC:0 "§YBorn:§! §L1887, in Guizhou Province, Qing Empire§!\n§YBackground:§! Wang Wenhua's journey from a dedicated student to a prominent military and political figure is a testament to his adaptability and leadership. Initially focused on learning, Wang graduated from Xingyi Academy in 1906 and pursued further education in Guizhou. By 1909, he attended the liberal arts department of Guizhou's top-level electoral department and soon served as superintendent of Xingyi Public Higher Primary School. During this time, he joined the San Francisco China Alliance Branch.\n\nAmid the tumult of the Xinhai Revolution, Wang was promoted to dean of a higher primary school and co-founded a sports club with He Jiwu. His revolutionary zeal led him to join Liu Xianshi's army, serving as the fourth standard belt of the Guizhou Army. After the Republic of China was established, Wang became the new army battalion commander.\n\nBy 1913, he had made enough of a name for himself that Tang Jiyao of the Yunnan Army appointed him as Director of the Guizhou Police Department. When Tang was transferred and Liu Xianshi rose to power, Wang was made deputy chief. His proposal to reform the patrol battalion into a new army was accepted, leading to his appointment as head of the 1st regiment of the Qian Army. After Yuan Shikai's death, Wang became commander of the 1st Division of the Guizhou Army and eventually the head of Guizhou.\n\nBy 1936, Wang faces challenges with widespread tax evasion undermining his administration's stability. With the authority of the Empire quickly collapsing, Wang's hold on Guizhou is precarious, and his future uncertain."
