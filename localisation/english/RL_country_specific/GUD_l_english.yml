 GUD_long_jiguang:0 "Long Jiguang"
 POLITICS_LONG_JIGUANG_DESC:0 "§YBorn:§! §L1867, in Yunnan Province, Qing Empire§!\n§YBackground:§! Long began his career as a staunch defender of the Qing, suppressing Republican uprisings across China. With the old dynasty's collapse, he threw his support behind Yuan Shikai and became one of his most reliable generals. While Yuan declared himself the Hongxian Emperor, Long fought bitter campaigns against Guangxi warlords Lu Rongting and Li Liejun, crushing their resistance to the monarchist restoration.\n\nAfter Yuan's triumph, Long consolidated his own regional power, though his rule was plagued by constant guerrilla warfare from scattered KMT remnants. By 1936, he remains one of the dynasty's most hardened loyalists, but faces mounting pressure as Kuomintang forces regroup and the reality of the empire's imminent collapse becomes harder to ignore."
