 SOV_review_party_unity_tt:0 "Option §YEnforced§!:\nThe §YCentralists§! gain §G+4§! influence\nThe §YRightists§! gain §G+1§! influence\n\nOption §YStatus Quo§!:\nThe §YCentralists§! gain §G+1§! influence\nThe §YRightists§! gain §G+4§! influence\n\nOption §YAbolished§!:\nThe §YCentralists§! lose §R-5§! influence\nThe §YDecists§! gain §G+1§! influence\nThe §YSyndicalists§! gain §G+1§! influence\nThe §YDemocrats§! gain §G+3§! influence"
