 SOV_mikhail_tukhachevsky:0 "Mikhail Tukhachevsky"
 POLITICS_MIKHAIL_TUKHACHEVSKY_DESC:0 "§YBorn:§! §LFebruary 16th, 1893, in Alexandrovskoye, Smolensk Governorate, Russian Empire§!\n§YBackground:§! Mikhail Nikolayevich has always been an ambitious man. Born into an impoverished yet noble family, he would take the only way out of poverty for many men his age; he joined the military. After attending the Cadet Corps, he would go on to graduate from the Aleksandrovskoye Military School, just in time to fight in the Great War. Declaring with his signature bravado that he would be a general before the age of thirty, he was promptly captured and would spend two years in a German POW camp.\n\nEscaping just in time to witness the October Revolution, he joined up with the Bolsheviks despite not being a committed socialist."
