 SOV_nikolai_bukharin:0 "Nikolai Bukharin"
 POLITICS_NIKOLAI_BUKHARIN_DESC:0 "§YBorn:§! §LOctober 9th, 1888, in Moscow, Russian Empire§!\n§YBackground:§! Born the son of two schoolteachers, Nikolai Ivanovich Bukharin has dedicated the majority of his life to the Bolshevik cause. As a student, he took part in demonstrations at Moscow University during the 1905 revolution, and joined the Russian Social Democratic Labor Party in 1906. He was internally exiled in Russia for his political activities before escaping to Germany and then the United States. After the 1917 revolution he returned to Russia and began working under Lenin, being promoted to Chairman of the Council shortly before Lenin's death, based on Lenin's fears that the current state of instability would be ideal conditions for Stalin or Trotsky to seize absolute power.\n\nSince then and until the present, Bukharin has worked hard to govern as Lenin would have, with a few of his own ideological touches. He has reinforced the New Economic Policy and is proud to have brought swathes of the Soviet People out of poverty and into a modern, socialist society. He has kept the NKVD on a tight leash, preferring to let the people think freely and express themselves through state-approved media. But now that most immediate issues have been solved, unrest is once again growing in the Party, and Bukharin is ill-equipped to deal with it. His centrist stint as Chairman has left him with many enemies and few friends, and he knows that his days in power are limited. The only question that remains is who he will favor to succeed him."
 SOV_dejected_idealist:0 "Dejected Idealist"
 
 SOV_grigory_sokolnikov:0 "Grigory Sokolnikov"
 
 SOV_sergei_kirov:0 "Sergei Kirov"
 POLITICS_SERGEI_KIROV_DESC:0 "§YBorn:§! §LMarch 27th, 1886, in Urzhum, Vyatka Governorate, Russian Empire§!\n§YBackground:§! Born into a peasant family, Sergei Kostrikov had lost both of his parents by the age of six; one to alcohol, and the other to tuberculosis. In 1901 he was able to secure a scholarship enabling him to study engineering at the Kazan Technical School, and subsequently the Tomsk Technological Institute. It was during his studies that he became aware of and joined the fledgling RSDLP, formally beginning his career as a professional revolutionary.\n\nCharming, loyal, and immensely popular, Kirov projects warmth and unity in a time of division. A man of the people with deep party ties, he seeks to restore stability without repression - though some suspect a harder edge lies beneath his affable exterior."
