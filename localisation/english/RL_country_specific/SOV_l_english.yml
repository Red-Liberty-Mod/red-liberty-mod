 ## Factionalism ##
 SOV_factionalism_category:0 "Factionalism"
 SOV_factionalism_category_desc:0 "Factionalism has infected the party! Lenin's successors have unfortunately failed to enforce his theory of Democratic Centralism, and now several distinct factions have emerged."
 
 SOV_factionalism_modifier:0 "Effects of Factionalism"
 
 industrialist_icon_tt:0 "The 'Centralists' are a faction that advocates, unsurprisingly, for a centralization of the soviet state and economy. They fundamentally oppose the NEP and ardently support centralized army control and industrial planning. As staunch vanguardists they oppose the weakening of democratic centralism, and should they come to power they would likely attempt to quash the other factions, perhaps violently."
 rightist_icon_tt:0 "Led by Grigory Sokolnikov, derided by their enemies as 'ekonomisty' and 'rightists', are a group of pragmatic thinkers, who see clearly the only way out of the situation - to deepen the NEP, loosen regulations on concessions and trade, promote a strong currency and austerity policies for fiscal stabilization, and re-entrance into the global market."
 decist_icon_tt:0 " The 'Decists' are a group oriented on demands of loosening party control over the army and the workers. As a left-wing group within the context of the RSFSR, they are in favor of cooperating with anarchists and other left-socialist organizations and view the NEP as a mistake and a capitalist restoration."
 syndicalist_icon_tt:0 "All political power to the Soviets! is the rallying cry of the Worker's Opposition, led by Alexander Shliapnikov. This faction seeks to radically reform the nation along syndicalist lines, granting the job of economic planning to a trade-union congress, and to have the RKP remain solely as an 'overseer'."
 democrat_icon_tt:0 "Led by 'moderate bolshevik' Lev Kamenev, he and his followers desire to transform the party into a big-tent socialist organization strongly interconnected with the state. An uphill battle, no doubt, but should they succeed they will have a nation governed by all the socialist forces, democratically and peacefully."
 
 SOV_industrialist_advisor_req:0 "§YCentralist§! opinion is at least §YNeutral§!"
 
