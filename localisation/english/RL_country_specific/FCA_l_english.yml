 ### Ideas ###
 FCA_underfunded_judiciary:0 "Underfunded Court System"
 FCA_underfunded_judiciary_desc:0 "The judicial system in Equatorial Africa has long struggled with a chronic lack of resources and qualified personnel. The problems are further exacerbated by the large territory of the colony, as well as the differences in legal status between settlers and natives; a reliance has developed on traditional native courts to cover the gaps."
 FCA_matswanist_resistance:0 "Matswanist Resistance"
 FCA_matswanist_resistance_desc:0 "Though the Mikalé is a proscribed organization it continues to operate clandestinely, its members engaging in passive resistance against the colonial regime. To our great embarrassment, despite Matswa himself being arrested and imprisoned in 1929, he has since escaped and is now in hiding. God knows where he is... or what he's planning."
 
