 ENG_archibald_ramsay:0 "Archibald Maule Ramsay"
 POLITICS_ARCHIBALD_RAMSAY_DESC:0 "§YBorn:§! §LMay 4th, 1894, in India§!\n§YBackground:§! Archibald Ramsay, \"Archie\" to his friends, has long been a loyal Unionist. Born in India, into an aristocratic family descended from the Earls of Dalhousie, he went on to be educated at Eton and RMC Sandhurst, before serving in France for two years in the Coldstream Guards regiment.\n\nHe entered parliament in 1931, serving his rural constituency compentently and quietly, mostly sticking to questions of agriculture and denouncements of Communism. Here he developed his reputation as a \"gentleman politician\", a scion of the Scottish aristocracy, an educated man who had served as an officer, and now lived in a castle.\n\nBut Archie never sought to be Prime Minister. He was requested by King Edward, and like any loyal Unionist, he accepted. Yet rumours aboad, rumours concerning him, rumours of a conspiracy. That his appointment was engineered in shadowy backrooms for purposes unknown. He ignores these rumours. His king asked him to serve and so he shall, to the best of his ability. Though questions remain; will he be able to steer the ship of state safely to port, or will unseen forces steer it for him? And is that port ahead, or the siren call of something far, far worse?"
 
