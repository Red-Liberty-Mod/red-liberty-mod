 ENG_clement_attlee:0 "Clement Attlee"
 POLITICS_CLEMENT_ATTLEE_DESC:0 "§YBorn:§! §LJanuary 3rd, 1883, in Putney, England, United Kingdom§!\n§YBackground:§! There is a saying amongst residents of Whitehall: \"An empty taxi pulled up to parliament and out stepped Clement Attlee\". Whether apocryphal or not, the spirit remains true: Clement Attlee is a man with little personality."
 
 ENG_ramsay_macdonald:0 "Ramsay MacDonald"
 POLITICS_RAMSAY_MACDONALD_DESC:0 "§YBorn:§! §LOctober 12th, 1866, in Lossiemouth, Scotland, United Kingdom§!\n§YBackground:§! How far a giant falls! Almost none can be said to have had as meteoric a rise as James Ramsay MacDonald, his zenith matched only by the distance of his fall.\n\nBorn the illegitimate son of a farm labourer, he lived in poverty until moving to London at the age of 19. It was there that witnessing the Bloody Sunday of 1887 began his long fascination with Socialism. After a brief flirtation with the Liberal Party, he joined Keir Hardie's Independent Labour Party in 1894, cementing himself within the sphere of radical politics. Rising up the ranks, he opposed Britian's involvement in the Great War, maintaining his stance even when it brought accusations of treason or cowardice.\n\nAfter a short intermission from 1919, he re-entered parliament in the 1922 \"Labour Wave\", which saw Labour, and by extension Ramsay, replace the Liberals as the official opposition. It would be just a few short years later, in 1929, that saw the party finally gain enough seats to form a government, with Ramsay sworn in as the first Labour Prime Minister in British history. This, sadly, is the high point of Ramsay's story.\n\nThe Depression of 1929 brought everything crashing down. Despite repeated urging, his refusal to break from the gold standard until 1931 led to the Pound Sterling Crash of that year, enraging his own party. When the crisis forced the government to adopt massive spending cuts, the split finally became irreconcilable. Ramsay was expelled from the Labour Party, going on to establish the National Labour Organisation, and entering into a coalition with the Conservatives.\n\nBy now, Ramsay is a shell of a man. Suffering from insomnia and encroaching senility, his health deteriorates with each passing day. Government failures are blamed on him personally, egged on by his supposed \"ally\", Stanley Baldwin. Just how much longer can one man persist?"
