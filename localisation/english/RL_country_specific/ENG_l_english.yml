 ### Events ###
 united_kingdom_skeleton.2.title:0 "PM Ramsay out, PM Ramsay in!"
 united_kingdom_skeleton.2.desc:0 "London, United Kingdom - Newly crowned King Edward VIII has taken the unprecedented move of dismissing PM Ramsay MacDonald, citing an inability to properly lead the country due to poor health. In his place he has appointed Archibald Ramsay (no relation), a Scottish Unionist known for his royalist sentiments.\n\nPublic outcry has been large, with the Labour party being particularly vocal in its opposition. Party leader Clement Attlee has given a speech decrying the dismissal as an unconstitutional breach of protocol.\n\nThe political situation is still developing, and it is unclear if the new PM has the necessary support even among his own party to maintain his position."
 united_kingdom_skeleton.2.a:0 "Blimey!"
