 ### AHE ###
 AHE_country_intro_title_1:0 "The End of War"
 AHE_country_intro_desc_1:0 "The year is 1919, and the §YGreat War§! has come to an end.\n\nIn §YBerlin§!, parades of prideful Germans march under the Imperial banner, overjoyed to have finally brought the conflict to an end, and in their favor no less.\n\nIn §YVienna§!, the story is very different. The streets are eerily quiet. A generation of sons, husbands, and fathers who inhabited the once-great city have departed to the afterlife, taken by the great conflict which sapped so much from the world. The people are not overjoyed by the news of victory. They are relieved, certainly, but the affair leaves a bitter taste in the mouths of those who sacrificed so much, and seemed to gain so, so little."
 
 ### FRA ###
 FRA_country_intro_title_1:0 "La Republique Revanchiste"
 FRA_country_intro_desc_1:0 "Ever since defeat in the §YFranco-Prussian War§! in 1871, France had desired nothing more than a proper rematch."
 FRA_country_intro_title_2:0 "Storm of Steel"
 FRA_country_intro_desc_2:0 "With the death of §YArchduke Franz Ferdinand§!, all of Europe was plunged into war. Germany's declaration of war on Russia triggered France's alliance with the latter, bringing them into the conflict.\n\nThe Germans quickly enacted the §YSchlieffen Plan§!, overrunning Belgium and Luxembourg, and occupying parts of Northern France. They were halted, however, and the fighting quickly devolved into trench warfare, with neither side able to overcome the other without staggering losses.\n\nThus the war continued, an endless game of attack and counter-attack, casualties in the hundreds of thousands. The introduction of tanks, while shocking to those seeing them for the first time, did little to break the stalemate. Dissension in the ranks grew all the while, with soldiers mutinying several times from 1917-1919. The §YKaiserschlacht§! of 1918 was only barely held back, with the German Army coming within 50km of Paris. With its failure, the will to continue fighting, on both sides, had all but run out."
 FRA_country_intro_title_3:0 "The Guns Fall Silent"
 FRA_country_intro_desc_3:0 "With the disappointing end of the §YAllied Spring Offensives§! in 1919, the French and British had finally had enough. Their generals' grand promises of a military victory had still not manifested, and domestic unrest continued to rise. Through neutral parties in the Netherlands and Switzerland, Allied diplomats began sending out feelers to Germany, inviting them to negotiate an end to the conflict. Dealing with their own unrest, and worried about the prospect of having to go through yet another winter, the Germans agreed.\n\nThe armistice began on §YAugust 4th, 1919§!. Five long years of war were finally over, but France's troubles were not. She had suffered approximately 1.7 million dead and another 4.3 million wounded, with some 27% of men between the ages of 18 and 27 killed. 120 thousand hectares of territory was rendered unusable due to the presence of unexploded ordnance. The government was deeply in debt, owing around 125 billion gold francs to creditors. The situation was grim indeed."
 FRA_country_intro_title_4:0 "Shattered Glass"
 FRA_country_intro_desc_4:0 "The §YTreary of Zurich§! was signed on §YNovember 11th, 1919§!, formally ending the Great War. Despite negotiating from a position of relative weakness, France got off rather well, with only a small indemnity and no change in territories.\n\nUnrest began almost immediately, with a general strike called by the CGT, only narrowly placated by the Briand government. Despite the collapse of the §YUnion Sacree§!, the 1920 elections were surprisingly civil, with a large victory for Briand's newly-formed §YBloc National§!. The SFIO did not fare so well. Long split between reformists and radicals, the leadership's support of the general strike and subsequent alignment with the Comintern caused the party's right wing led by Leon Blum to break away and join Briand's PRS."
 FRA_country_intro_title_5:0 "Appendix"
 FRA_country_intro_desc_5:0 "French Governments:\n\n§YRibot V§! (March 20th, 1917 - September 7th, 1917)\n§YPainlevé I§! (September 12th, 1917 - November 16th. 1917)\n§YClemenceau II§! (November 16th, 1917 - July 23rd, 1919)\n§YCaillaux II§! (July 23rd, 1919 - September 13th, 1919)\n§YBriand VII§! (September 13th, 1919 - February 18th, 1920)\n§YBriand VIII§! (February 18th, 1920 - )"
 
 ### IRE ###
 IRE_country_intro_title_1:0 "The Martyr Days"
 IRE_country_intro_desc_1:0 "Ireland, 1916. The §YEaster Rising§! has failed. Its forces are scatteredm and its leaders sit in prison, awaiting execution. §YKilmainham Gaol§! is surrounded by protestors, with more arriving by the hour and outrage quickly growing in response to the rapid executions.\n\nBut then, word leaks: §YJames Connolly§!, the very face of the insurrection, is set to be executed that day. The already angry rioters are incensed and, rather than scatter when shots are fired, they begin to retaliate with bricks and rocks, a few even pulling pistols left over from the Rising. The rioters storm the prison, successfully freeing Connolly and §YSeán MacDiarmada§! among others, before retreating and carrying the horribly-wounded Connolly and polio-ridden MacDiarmada out and into hiding. But not all could be saved.\n\nA furious General Maxwell orders the executions of any prisoners remaining, among them §YÉamonn de Valera§! and §YConstance Markievicz§!."
 IRE_country_intro_title_2:0 "A Free Ireland"
 IRE_country_intro_desc_2:0 "The Rising was just a prelude, and in 1921 a centuries-long held dream was finally achieved: independence.\n\nHaving assumed leadership over the movement after MacDiarmada's death in 1918, §YMichael Collins§! was able to secure complete independence for all but but the 6 most militantly Protestant counties in the north.\n\nThis peace, though championed by Collins and his supporters, did not satisfy everyone: the socialist §RIrish Citizens Army§! and radical members of the nationalist §gIrish Republican Army§! refused to recognize any state which did not comprise the whole of the Emerald Isle. Dissent spiraled into civil war, though ultimately the ICA and anti-treaty IRA could never hope to match the strength of the newly-founded §YNational Army§!. With the the anti-treaty forces beaten, Collins set about building his new republic."
 IRE_country_intro_title_3:0 "The Iron Republic"
 IRE_country_intro_desc_3:0 "Sweeping arrests were carried out by the Gardai, which saw the imprisonment of any figures speculated to have played a part in the civil war. However, the at-best circumstantial nature of many cases led to the labelling of the arrests as nothing more than an attempt by the new government to silence opposition. In the end, thousands of people, many of whom had fought alongside Collins just a year prior, were found guilty of sedition against the Republic.\n\nIn response to public outcry, but unwilling to fully commute the sentences of some of the arrested, a maximum prison time of 12 years was imposed for the crime of sedition, greatly lowering the time demanded of Ireland’s most notable radicals, and ensuring that most would be released sometime in early 1935. Collins, maintaining his firm position as President, would devote the next decade to the establishment of a stable and unified government, with many of the laws pushed through by his own party (Na Chéad Laochra) designed implicitly to weaken opposition in the country."
 IRE_country_intro_title_4:0 ""
 IRE_country_intro_desc_4:0 "Forced out of politics, many radicals found new homes in the rebounding ICA and IRA."
 
 ### SOV ###
 SOV_country_intro_title_1:0 "October Days"
 SOV_country_intro_desc_1:0 "Ah, those were the days. When the Tsar was overthrown, the people were full of spirit, and the air was full of hope for a brighter future.\n\nDespite its promise, the §RRevolution§! was never able to spread beyond European Russia. The loss of Ukraine, combined with Entente interventions and pressure from the §YSouthern Volunteer Army§! forced the nascent §RRed Army§! to halt at the Urals to deal with Denikin's forces. By the time that issue was settled, neither the reds nor Kolchak's forces could dislodge the other. An unofficial ceasefire was adopted."
 SOV_country_intro_title_2:0 "Moscow Nights"
 SOV_country_intro_desc_2:0 "§YComrade Lenin§! passed in §Y1924§!. A party already in disarray seemed poised to go over the edge. The election of §YComrade Bukharin§! only narrowly averted disaster. Bukharin has led valiantly, modernizing the country with the limited resources at his disposal."
 SOV_country_intro_title_3:0 "Siberian Dawn"
 SOV_country_intro_desc_3:0 "If reports are to be believed, the reactionary Siberian government is on its last legs. Crushed between a mountain of debt and a wave of dissent. The final hour is approaching. For the sake of all humanity, it is a fight we can not lose.\n\nSo comrades, come rally\nAnd the last fight let us face\nThe Internationale unites the human race!"
 
 ### USA ###
 USA_country_intro_title_1:0 "The Gilded Age"
 USA_country_intro_desc_1:0 "At the turn of the century, the §3United States of America§! was in the throes of a great war. There was no declaration of hostilities, there were no armies, yet it was a war all the same. On one side, the forces of capital. On the other, the forces of labor. This was the §YGreat Class War§!, raging since the dawn of time. \n\nFollowing a recent string of victories for capital, the §7Republican§! candidate §YWilliam McKinley§! ascended to the presidency on March 4th, 1897, and would serve as president until the completion of his second term on March 4th, 1905. His administration was a typical one; he furthered American Imperialism abroad, and furthered the interests of the upper class at home. The position of capital was secure.\n\nYet there was one who would stand against them. The §RSocialist Party of America§! would speak for the worker, who had no voice of his own."
 USA_country_intro_title_2:0 "Labor's Star Ascendant"
 USA_country_intro_desc_2:0 "The Winner-Take-All electoral system of the §3United States§! has long meant that two parties dominate the country's politics, from the local level up to the national. Once a party has secured the presidency even once, their electoral fortunes are assured for the foreseeable future.\n\nFor the better part of a century, the §3Democratic§! and §7Republican§! parties used this fact to their advantage. Both were capitalist in flavor; although the specifics varied by date and party, it was known that neither would ever become friendly to socialists in their ranks, making at best meaningless concessions to the working class.\n\nIt was long assumed that the system's strength lay in its rigidity; the fact that a party must win the presidency to be taken seriously on the national level would forever protect them from meaningful competition.\n\nWhat they failed to count on was the growing anger of the American people."
 USA_country_intro_title_3:0 "The V Stands for Victory"
 USA_country_intro_desc_3:0 "The 1912 election changed everything. In an instant, a deadly blow was struck against the forces of capital, and §YEugene Victor Debs§! was elected the 29th president of the §3United States§!.\n\nBut the battle was not over yet. The forces of labor would have to fight tooth and nail for every inch of political ground ahead of them. But fight they did, winning battles for the decolonization of the Philippines, protections for unionizing workers, and ever-important relief measures for the struggling economy."
 USA_country_intro_title_4:0 "The Roaring Twenties"
 USA_country_intro_desc_4:0 ""
 USA_country_intro_title_5:0 "Hoover's Folly"
 USA_country_intro_desc_5:0 "But the good feelings would not last. In the spring of 1930, the system collapsed. Stocks fell, breadlines formed, and the coutry went to hell. Unfortunately for the country the man in the White House was §YHerbert Clark Hoover§!.\n\nA man who couldn’t bear to watch suffering, his reaction was one of denial. On December 2nd, 1930 the President informed Congress that "the fundamental strength of the economy is unimpaired." In 1932, when he was finally convinced to act, he created the Resconstruction Finance Corporation, which promptly loaned out 90 million dollars to banks, and and only 30 million dollars to states for relief.\n\nThe people of America were well aware of the President's apathy, and even the staunchest conservative recognized that he needed to go. The 1932 election saw the triumphant return of the §RSocialist Party§! to the halls of power, in the person of §YNorman Thomas§!."
 USA_country_intro_title_6:0 "Appendix"
 USA_country_intro_desc_6:0 "List of presidents since 1900:\n\n- §7William McKinley§! (1897-1905)\n- §7Charles Fairbanks§! (1905-1909)\n- §3John Albert Johnson§! (1909-1910)*\n- §3David Rowland Francis§! (1910-1913)\n- §7William Taft§! (1913-1917)\n- §REugene Victor Debs§! (1917-1921)\n- §3William Gibbs McAdoo§! (1919-1929)\n- §3Herbert Clark Hoover§! (1929-1933)\n- §RNorman Thomas§! (1933-)\n\n*Died in office"
 
