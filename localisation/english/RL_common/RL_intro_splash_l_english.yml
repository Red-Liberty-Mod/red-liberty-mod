 SOV_country_intro_title_1:0 "October Days"
 SOV_country_intro_desc_1:0 "Despite its promise, the §RRevolution§! was never able to spread beyond European Russia. The loss of Ukraine, combined with Entente interventions and pressure from the §YSouthern Volunteer Army§! forced the nascent §RRed Army§! to halt at the Urals to focus on dealing with Denikin's forces. By the time they were beaten, the Ural front had stagnated, with neither the Reds nor Kolchak's forces able to dislodge the other. An unofficial ceasefire was adopted.\n\nWith that issued seemingly settled for the immediate future, the revolution began to look inward. §YWar Communism§! was replaced with the §YNew Economic Policy§!, ostensibly a temporary measure intended to build up the productive forces before the revolution could once again spread outward. This was by no means a popular policy, with the nascent §YLeft Opposition§! finding cause to attack it fervently. More factions would soon form, centered around the many debates the government found itself engaged in."
 SOV_country_intro_title_2:0 "Moscow Nights"
 SOV_country_intro_desc_2:0 "§YComrade Lenin§! passed in §Y1924§!, leaving a party already in disarray seemingly poised to go over the edge. The election of §YComrade Bukharin§! only narrowly averted disaster, though §YComrade Trotsky§! was only further incensed. An attempt at organizing a party coup failed, ending with his expulsion from the party in 1928.\n\nBukharin has led valiantly, modernizing the country with the limited resources at his disposal."
 SOV_country_intro_title_3:0 "Siberian Twilight"
 SOV_country_intro_desc_3:0 "If reports are to be believed the reactionary Siberian government is on its last legs; crushed between a mountain of debt and a wave of dissent. The final hour is approaching. For the sake of all humanity, it is a fight we can not lose.\n\nSo comrades, come rally\nAnd the last fight let us face\nThe Internationale unites the human race!"
 
