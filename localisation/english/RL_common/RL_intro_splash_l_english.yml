 red_liberty_intro_title:0 "Welcome to Red Liberty!"
 red_liberty_intro_desc:0 "§YThank you for playing our mod! Please be aware that there may be issues/missing content. If you find any issues, or want to leave feedback, please let us know on discord.§!\n\n§YBrought to you by§!:\nAlexander, Divine, Jishy, Metehan, Mexican Mapper, obamna, Saba, skfj, Sovestkonaut, vladyslav3104, Wang Ming, Wobbly\n\n§YSpecial Thanks to§!:\nFlashingLight/Metooxas, Jack, That Guy, TheXenoRaptor, Weis29\n\n§YThank You to our Former Members§!:\naidyfinn, AlfredVonBon, Battle of Kursk, GZ-098, IbimsTim, John662314, Katze, Neopolaria, Pol Pot Gaming, IbimsTim, LaRevanchette, Serwall, Xenomorphman"
 
 mechanics_inf_desc:0 "Red Liberty introduces two new types of infantry: §YLight Infantry§! and §YElite Infantry§!.\n\n§YLight Infantry§! represents light battalions equipped with small arms, but lacking heavy equipment such as machine guns and mortars. They have bonuses to movement in adverse terrain, and can be trained cheaply and quickly compared to standard infantry units. However, they suffer on the defense and do not benefit from the §YSupport Weapons§! research line.\n\n§YElite Infantry§! represents"
 mechanics_art_desc:0 "Several changes are made in order to improve the viability of §YLine Artillery§!."
 
 ### AHE ###
 AHE_country_intro_title_1:0 "The End of War"
 AHE_country_intro_desc_1:0 "The year is 1919, and the §YGreat War§! has come to an end.\n\nIn §YBerlin§!, parades of prideful Germans march under the Imperial banner, overjoyed to have finally brought the conflict to an end, and in their favor no less.\n\nIn §YVienna§!, the story is very different. The streets are eerily quiet. A generation of sons, husbands, and fathers who inhabited the once-great city have departed to the afterlife, taken by the great conflict which sapped so much from the world. The people are not overjoyed by the news of victory. They are relieved, certainly, but the affair leaves a bitter taste in the mouths of those who sacrificed so much, and seemed to gain so, so little."
 AHE_country_intro_title_2:0 "A Return to Normalcy?"
 AHE_country_intro_desc_2:0 "Immediately following the declaration of peace, it was declared that new elections to the Imperial Council and Royal Parliament were to be held in early 1920. In Cisleithania, the elections saw a sudden and dramatic decline in popularity of the incumbent §YChristian Social Party§! throughout the the region, which had taken much of the blame for Austria's poor wartime performance. A similar story was true of the §YNational Party of Work§! in Hungary, which was criticized for allowing Hungarian men to die in an \"Austrian War.\"\n\nThough both parties barely held on in both regions, one could not deny that their rapidly-declining popularity would soon be their downfall if they failed to in some way broaden their appeal. In an effort to ease tensions, Kaiser Karl would appoint §YIgnaz Seipel§! as Minister-President of the Empire, the first non-noblemen to hold the position. Seipel, a popular leader of the CSP, levied harsh criticisms against the Social Democratic opposition, managing to keep his party alive by unifying it and taking critical electoral ground from his opponents."
 AHE_country_intro_title_3:0 "Losing the Peace"
 AHE_country_intro_desc_3:0 "However, as Seipel and the Kaiser did their best to maintain Austria-Hungary’s moderate politics, the situation worsened. As the nation's economic minister, §YAlexander Spitzmüller§!, failed to effectively manage demobilization and create a functioning peacetime economy, widespread poverty quickly spread through the streets of Vienna, Budapest, Prague, Zagreb, and other major cities. Unemployment skyrocketed, while farmers found their goods made effectively worthless by high volumes of market saturation.\n\nIn 1923, the Seipel Cabinet collapsed, prompting another round of elections. This time, the results would result in an electoral deadlock, though the CSP managed to barely hold onto a minority government, drawing further ire from left-wing politicians. A series of further elections would be held from 1926-1932 as the Seipel Cabinet proved increasingly volatile, but a divided opposition and relatively popular base among middle-class Austrians allowed Seipel's minority government to maintain its grip on power."
 AHE_country_intro_title_4:0 "The Other Half"
 AHE_country_intro_desc_4:0 "Meanwhile in Hungary, parliamentary elections displayed a similar trend, though at a much faster rate. The §YNational Party of Work§! managed to maintain its edge over pro-independence factions in the 1920 election, though as the opposition began to grow more varied and center less around the single issue of independence from the Empire, the liberals rapidly began losing ground.\n\nThe NPW would not survive long after its electoral victory, collapsing in 1922 and being replaced by the newly-founded conservative §YChristian National Union Party§!. Cooperation with successor liberal parties enabled the Christian Unionists to maintain power for several years, however, by 1929 the new party had also begun to rip apart at the seams. The governing coalition collapsed and before long, the Christian Socialist and Social Democratic parties of Hungary had pulled ahead in the polls, forming a coalition and then a government in 1930."
 
 ### FRA ###
 FRA_country_intro_title_1:0 "La Republique Revanchiste"
 FRA_country_intro_desc_1:0 "Ever since defeat in the §YFranco-Prussian War§! in 1871, France had desired nothing more than a proper rematch."
 FRA_country_intro_title_2:0 "Storm of Steel"
 FRA_country_intro_desc_2:0 "With the death of §YArchduke Franz Ferdinand§!, all of Europe was plunged into war. Germany's declaration of war on Russia triggered France's alliance with the latter, bringing them into the conflict.\n\nThe Germans quickly enacted the §YSchlieffen Plan§!, overrunning Belgium and Luxembourg, and occupying parts of Northern France. They were halted, however, and the fighting quickly devolved into trench warfare, with neither side able to overcome the other without staggering losses.\n\nThus the war continued, an endless game of attack and counter-attack, casualties in the hundreds of thousands. The introduction of tanks, while shocking to those seeing them for the first time, did little to break the stalemate. Dissension in the ranks grew all the while, with soldiers mutinying several times from 1917-1919. The §YKaiserschlacht§! of 1918 was only barely held back, with the German Army coming within 50km of Paris. With its failure, the will to continue fighting, on both sides, had all but run out."
 FRA_country_intro_title_3:0 "The Guns Fall Silent"
 FRA_country_intro_desc_3:0 "With the disappointing end of the §YAllied Spring Offensives§! in 1919, the French and British had finally had enough. Their generals' grand promises of a military victory had still not manifested, and domestic unrest continued to rise. Through neutral parties in the Netherlands and Switzerland, Allied diplomats began sending out feelers to Germany, inviting them to negotiate an end to the conflict. Dealing with their own unrest, and worried about the prospect of having to go through yet another winter, the Germans agreed.\n\nThe armistice began on §YAugust 4th, 1919§!. Five long years of war were finally over, but France's troubles were not. She had suffered approximately 1.7 million dead and another 4.3 million wounded, with some 27% of men between the ages of 18 and 27 killed. 120 thousand hectares of territory was rendered unusable due to the presence of unexploded ordnance. The government was deeply in debt, owing around 125 billion gold francs to creditors. The situation was grim indeed."
 FRA_country_intro_title_4:0 "Shattered Glass"
 FRA_country_intro_desc_4:0 "The §YTreaty of Zurich§! was signed on §YNovember 11th, 1919§!, formally ending the Great War. Despite negotiating from a position of relative weakness, France got off rather well, with only a small indemnity and no change in territories.\n\nUnrest began almost immediately, with a general strike called by the CGT, only narrowly placated by the Briand government. Despite the collapse of the §YUnion Sacree§!, the 1920 elections were surprisingly civil, with a large victory for Briand's newly-formed §YBloc National§!. The SFIO did not fare so well. Long split between reformists and radicals, the leadership's support of the general strike and subsequent alignment with the Comintern caused the party's right wing led by Leon Blum to break away and join Briand's PRS."
 FRA_country_intro_title_5:0 "Appendix"
 FRA_country_intro_desc_5:0 "French Governments:\n\n§YRibot V§! (March 20th, 1917 - September 7th, 1917)\n§YPainlevé I§! (September 12th, 1917 - November 16th. 1917)\n§YClemenceau II§! (November 16th, 1917 - July 23rd, 1919)\n§YCaillaux II§! (July 23rd, 1919 - September 13th, 1919)\n§YBriand VII§! (September 13th, 1919 - February 18th, 1920)\n§YBriand VIII§! (February 18th, 1920 - )"
 
 ### IRE ###
 IRE_country_intro_title_1:0 "The Martyr Days"
 IRE_country_intro_desc_1:0 "Ireland, 1916. The §YEaster Rising§! has failed. Its forces are scattered and its leaders sit in prison, awaiting execution. §YKilmainham Gaol§! is surrounded by protestors, with more arriving by the hour and outrage quickly growing in response to the rapid executions.\n\nBut then, word leaks: §YJames Connolly§!, the very face of the insurrection, is set to be executed that day. The already angry rioters are incensed and, rather than scatter when shots are fired, they begin to retaliate with bricks and rocks, a few even pulling pistols left over from the Rising. The rioters storm the prison, successfully freeing Connolly and §YSeán MacDiarmada§! among others, before retreating and carrying the horribly-wounded Connolly and polio-ridden MacDiarmada out and into hiding.\n\nBut not all could be saved; a furious General Maxwell orders the executions of any prisoners remaining, among them §YÉamonn de Valera§! and §YConstance Markievicz§!."
 IRE_country_intro_title_2:0 "A Free Ireland"
 IRE_country_intro_desc_2:0 "The Rising was just a prelude, and in 1921 a centuries-long held dream was finally achieved: independence.\n\nHaving assumed leadership over the movement after MacDiarmada's death in 1918, §YMichael Collins§! was able to secure complete independence for all but but the 6 most militantly Protestant counties in the north.\n\nThis peace, though championed by Collins and his supporters, did not satisfy everyone: the socialist §RIrish Citizens Army§! and radical members of the nationalist §gIrish Republican Army§! refused to recognize any state which did not comprise the whole of the Emerald Isle. Dissent spiraled into civil war, though ultimately the ICA and anti-treaty IRA could never hope to match the strength of the newly-founded §YNational Army§!. With the the anti-treaty forces beaten, Collins set about building his new republic."
 IRE_country_intro_title_3:0 "The Iron Republic"
 IRE_country_intro_desc_3:0 "Sweeping arrests were carried out by the Gardai, which saw the imprisonment of any figures speculated to have played a part in the civil war. However, the at-best circumstantial nature of many cases led to the labelling of the arrests as nothing more than an attempt by the new government to silence opposition. In the end, thousands of people, many of whom had fought alongside Collins just a year prior, were found guilty of sedition against the Republic.\n\nIn response to public outcry, but unwilling to fully commute the sentences of some of the arrested, a maximum prison time of 12 years was imposed for the crime of sedition, greatly lowering the time demanded of Ireland’s most notable radicals, and ensuring that most would be released sometime in early 1935. Collins, maintaining his firm position as President, would devote the next decade to the establishment of a stable and unified government, with many of the laws pushed through by his own party (Na Chéad Laochra) designed implicitly to weaken opposition in the country."
 IRE_country_intro_title_4:0 ""
 IRE_country_intro_desc_4:0 "Forced out of politics, many radicals found new homes in the rebounding ICA and IRA."
 
