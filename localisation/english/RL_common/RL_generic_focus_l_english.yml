l_english:
 generic_focus: "Generic National Focus Tree"

### Generic Focuses ###
 generic_army_effort: "Modern Warfare"
 generic_army_effort_desc: "Despite the increasing possibilities of aerial and naval warfare, ground combat is still key in tomorrow's wars. With preparation, we can avoid reliving the hell of the trenches."
 generic_equipment_effort: "Equipment Modernization"
 generic_equipment_effort_desc: "The limits for what equipment can be carried by infantry are constantly being pushed. We will focus on giving our troops the best tools available."
 generic_motorization_effort: "Army Motorization"
 generic_motorization_effort_desc: "Mobility and protection are crucial to get infantry into and out of the field safely. Focusing on these developments will allow us to take action quickly."
 generic_doctrine_effort: "Studying the Past"
 generic_doctrine_effort_desc: "The military doctrines that defined ground combat in the Great War are outdated. We must put our greatest minds to the task of shaping the military thought of tomorrow."
 generic_equipment_effort_2: "Equipment Research"
 generic_equipment_effort_2_desc: "We will continue our efforts to ensure our infantry and support troops are armed with the best possible equipment of our time."
 generic_mechanization_effort: "Mechanized Warfare"
 generic_mechanization_effort_desc: "Rethinking the possibilities of motorized infantry, we can push the limits of what vehicles can be constructed today."
 generic_doctrine_effort_2: "Military Exercises"
 generic_doctrine_effort_2_desc: "The battlefield has changed not just in the interbellum years, but over the course of recent conflicts. We must continuously reevaluate our doctrines to reflect this."
 generic_equipment_effort_3: "Equipment Breakthroughs"
 generic_equipment_effort_3_desc: "Instead of imitating or buying foreign equipment, we should aim to become world-leading in infantry weapons."
 generic_armor_effort: "Armored Warfare"
 generic_armor_effort_desc: "Applying what we have learned from mechanizing our infantry, we can improve our armored vehicles as well."
 generic_special_forces: "Special Forces"
 generic_special_forces_desc: "We have need of elite forces; mountain troops and paratroopers should be our priority."

 generic_aviation_effort: "National Air Force"
 generic_aviation_effort_tt: "Not enough building slots for §YAir Base§!"
 generic_aviation_effort_desc: "Nowhere is technological advances more rapid than in aerial warfare. Aviation is a field any modern nation must master."
 generic_fighter_focus: "Air Superiority"
 generic_fighter_focus_desc: "We have not seen that last of dogfights in the Great War. Keeping ahead in the development of fighter planes will give us an edge in the future."
 generic_bomber_focus: "Strategic Bombing"
 generic_bomber_focus_desc: "When people of the future speak of the horror to today's wars, fire raining from the skies will prominently feature. We will do our best to ensure those stories are told by our enemies."
 generic_aviation_effort_2: "Modern Air Tactics"
 generic_aviation_effort_2_desc: "Further advances in aviation will be necessary to integrate our air force well with other branches of the military."
 generic_CAS_effort: "Close Air Support"
 generic_CAS_effort_desc: "A modern army needs support from vehicles not only on the ground, but also in the air."
 generic_rocket_effort: "Experimental Rocketry"
 generic_rocket_effort_desc: "Rocket and jet engines allow for unprecedented speeds for unmanned and manned vessels alike. Pioneering these technologies will allow us to take the enemy by surprise."
 generic_NAV_effort: "Naval Aviation"
 generic_NAV_effort_desc: "Just as the new naval warfare takes place in part beneath the water's surface, part of it takes place in the air above the waters."

 generic_naval_effort: "Modern Dockyards"
 generic_naval_effort_tt: "Not enough building slots for §YNaval Dockyards§!"
 generic_naval_effort_desc: "The expansion of our navy should be our first priority. Assign all available resources to new Dockyards and research into light surface ships."
 generic_flexible_navy: "Flexible Tactics"
 generic_flexible_navy_desc: "Reinventing naval warfare to account for the advances in submarine technology will allow us to strike efficiently against enemy convoys."
 generic_large_navy: "Power Projection"
 generic_large_navy_desc: "Adapting our naval doctrines to accommodate large ships and ensuring the safety of our trade convoys will teach us much about what sort of ships we need."
 generic_submarine_effort: "Submarine Warfare"
 generic_submarine_effort_desc: "Submarine warfare is the most exciting naval development since the invention of the torpedo boat. We would do well to not just protect against submarines, but also use them against enemy shipping."
 generic_cruiser_effort: "Screen Ships"
 generic_cruiser_effort_desc: "Before making forays into advanced battleship research, the smaller cruisers are in need of replacement."
 generic_destroyer_effort: "Anti-Submarine Warfare"
 generic_destroyer_effort_desc: "Studying the design and strategic use of submarines, we have also learned how to counter those strategies. Destroyers will be crucial for this."
 generic_capital_ships_effort: "Capital Ships"
 generic_capital_ships_effort_desc: "The nation with the most battleships will rule the oceans. Battleships and carriers represent the old and the new in naval superiority."

 generic_industrial_effort: "New Industrial Methods"
 generic_industrial_effort_desc: "Focus all our political efforts on building up the civilian industry in a great leap forward."
 generic_construction_effort: "Industrial Grants"
 generic_construction_effort_tt: "Not enough building slots for §YCivilian Factories§!"
 generic_construction_effort_desc: "Civilian industrial capacity must not be underestimated even when war looms over the world."
 generic_production_effort: "State Armories"
 generic_production_effort_tt: "Not enough building slots for §YMilitary Factory§!"
 generic_production_effort_desc: "If you can build tractors, you can build tanks! We must not allow our military production capacity to lag behind."
 generic_construction_effort_2: "Industrial Centres"
 generic_construction_effort_2_desc: "Continuing to expand our factories will allow us to speed up production of goods for trade and further construction efforts."
 generic_production_effort_2: "Military Manufactures"
 generic_production_effort_2_desc: "Trying to adapt civilian factories to produce military equipment is inefficient. We should focus on preparing military production now."
 generic_production_effort_3: "Military Industry"
 generic_production_effort_3_desc: "Continued efforts to expand our military factories are necessary to meet the demands for new equipment."
 generic_infrastructure_effort: "National Infrastructure"
 generic_infrastructure_effort_desc: "A country without proper infrastructure cannot pursue advanced projects or constructions."
 generic_infrastructure_effort_tt: "Not enough building slots for §YInfrastructure§!"
 generic_synth_oil_effort_tt: "Not enough building slots for §YSynthetic Refinery§!"
 generic_infrastructure_effort_2: "Railway Networks"
 generic_infrastructure_effort_2_desc: "Extending our infrastructure further will enable the transports and communications necessary for high-tech clandestine projects."
 generic_construction_effort_3: "Industrial Networks"
 generic_construction_effort_3_desc: "Expansion of our infrastructure network has significantly improved our capacity for construction."

 generic_extra_tech_slot: "Research Council"
 generic_extra_tech_slot_desc: "Our industrial expansion and other recent advances might allow us to conduct more R&D in parallel."
 generic_extra_tech_slot_2: "[ROOT.capital.GetCapitalVictoryPointName] Research Institute"
 generic_extra_tech_slot_2_desc: "The rapid industrialization of our nation has opened up new opportunities in R&D that we should pursue."
 generic_technology_sharing: "Technology Sharing"
 generic_technology_sharing_desc: "By sharing technological advances with our allies, our whole faction will be able to conduct wartime R&D more efficiently."
 generic_secret_weapons: "Secret Weapons"
 generic_secret_weapons_desc: "It is tempting to expend all extra resources into developing tanks and planes, but the secret to winning wars lies in whole new fields of science; electronics, rocketry and nuclear research."
 
