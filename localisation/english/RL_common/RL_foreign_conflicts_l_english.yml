### Appalachian Insurgency ###
conflict_name_3:0 "The Appalachian Insurgency"
 ## USA ##
 USA_conflict_desc_3:0 "§YThe Appalachian Insurgency§!\n\nNot all is well in Appalachia, as William D. Pelley, rounding up and amassing a large scale militant insurgency, using his Silver Shirts to terrorise and intimidate the local populace to join his despicable paramilitary group, with even some joining on their own intuition, as they view the current socialist aligned leadership in D.C. as an encroaching threat on their so-called individual rights. If we are to stabilise the situation, we must act swiftly, before Pelley is able to amass a force capable of pushing out even local governance in the region.\n\n§YInsurgency Strength§!: [?USA_insurgency_strength]%"
 
