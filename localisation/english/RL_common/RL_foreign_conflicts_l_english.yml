 USA_conflict_desc_2:0 "§YThe Brazilian Civil War§!\n\nThe United States government officially takes a stance of neutrality in the Brazilian conflict. Unofficially, President Thomas would prefer to see Vargas and his illegal putschists gone.\n\nThe arms embargo the the U.S. enforces, while representing a principled stance, also has the added benefit of dampening any international support for the Varguists.\n\nBlockade Effectiveness: 56%"
