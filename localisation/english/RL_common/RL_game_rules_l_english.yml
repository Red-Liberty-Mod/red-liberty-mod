 ### North America ###
 ## USA ##
 USA_ELECTION_1936_OUTCOME:0 "@USA Outcome of the 1936 Election"
 RULE_OPTION_USA_ELECTION_OUTCOME_RANDOM:0 "Default - Random"
 RULE_OPTION_USA_ELECTION_OUTCOME_RANDOM_DESC:0 "The 1936 election will be a defining moment for America. A sluggish economy, rising conservative opposition, and a party unsure of its own future. May the best man win."
 RULE_OPTION_USA_ELECTION_1936_OUTCOME_THOMAS:0 "£GFX_spa_texticon Socialists - Norman Thomas"
 RULE_OPTION_USA_ELECTION_1936_OUTCOME_THOMAS_DESC:0 "The §RSocialist Party of America§! under President §YNorman Thomas§!, following a highly successful four years in office, shall handily win re-election."
 RULE_OPTION_USA_ELECTION_1936_OUTCOME_HILL:0 "£GFX_dem_texticon Democrats - Joseph Lister Hill"
 RULE_OPTION_USA_ELECTION_1936_OUTCOME_HILL_DESC:0 "The §3Democratic Party§!, capitalizing on the Socialist's instability, manage to secure a narrow majority in the electoral college, and win the 1936 election."
 
 USA_ELECTION_1940_OUTCOME:0 "@USA Outcome of the 1940 Election"
 RULE_OPTION_USA_ELECTION_1940_OUTCOME_RANDOM:0 "Default - Random"
 RULE_OPTION_USA_ELECTION_1940_OUTCOME_RANDOM_DESC:0 "With another global war on the horizon, the 1940 election may prove to be even more significant that the last. May the best man win."
 RULE_OPTION_USA_ELECTION_1940_OUTCOME_THOMAS:0 "£GFX_spa_texticon Socialists - Norman Thomas"
 RULE_OPTION_USA_ELECTION_1940_OUTCOME_THOMAS_DESC:0 "Deciding that his work is not yet finished, §YPresident Thomas§! shall break with tradition to run for, and win, an unprecedented third term.\n\nRequires:\n§Y$RULE_OPTION_USA_ELECTION_1936_OUTCOME_THOMAS$§! in §Y$USA_ELECTION_1936_OUTCOME$§!"
 RULE_OPTION_USA_ELECTION_1940_OUTCOME_HOAN:0 "£GFX_spa_texticon Socialists - Daniel Hoan"
 RULE_OPTION_USA_ELECTION_1940_OUTCOME_HOAN_DESC:0 "Representing the \"constructive\" tendency of the party, §YDaniel Hoan§! will secure the nomination to succeed President Thomas, going on to win the 1940 election."
 RULE_OPTION_USA_ELECTION_1940_OUTCOME_LINDBERGH:0 "£GFX_dem_texticon Democrats - Charles Lindbergh"
 RULE_OPTION_USA_ELECTION_1940_OUTCOME_LINDBERGH_DESC:0 "Riding a wave of conservative sentiment, famed aviator §YCharles Lindbergh§! will emerge victorious in the 1940 election.\n\nRequires:\nNOT:§Y$RULE_OPTION_USA_ELECTION_1936_OUTCOME_HILL$§! in §Y$USA_ELECTION_1936_OUTCOME$§!"
 
