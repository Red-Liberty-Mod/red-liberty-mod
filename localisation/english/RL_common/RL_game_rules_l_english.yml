 ## JAP ##
 JAP_POST_INUKAI_OUTCOME:0 "@JAP Post-Inukai Japan"
 RULE_OPTION_JAP_POST_INUKAI_RANDOM:0 "Default - Random"
 RULE_OPTION_JAP_POST_INUKAI_RANDOM_DESC:0 "Everyone knows that Prime Minister Inukai is not long for this world. What is not known is who will take his place."
 RULE_OPTION_JAP_POST_INUKAI_STATUS_QUO:0 "The Status Quo"
 RULE_OPTION_JAP_POST_INUKAI_STATUS_QUO_DESC:0 "After winning the snap elections, the §YMinseito§! party chooses to coalition with the §CSeiyukai§!, upholding the status quo."
 RULE_OPTION_JAP_POST_INUKAI_CONSTITUTIONAL_AMENDMENT:0 "The Constitutional Amendment"
 RULE_OPTION_JAP_POST_INUKAI_CONSTITUTIONAL_AMENDMENT_DESC:0 "After winning the snap elections, the §YMinseito§! party chooses to coalition with the §PRonoto§!, and successfully petitions the Emperor to amend the constitution."
 RULE_OPTION_JAP_POST_INUKAI_KONOE_GOVT:0 "The Konoe Government"
 RULE_OPTION_JAP_POST_INUKAI_KONOE_GOVT_DESC:0 "After winning the snap elections, the §YMinseito§! party chooses to coalition with the §PRonoto§!, and fails to petition the Emperor to amend the constitution, allowing §gFumimaro Konoe§! to seize power."
 
