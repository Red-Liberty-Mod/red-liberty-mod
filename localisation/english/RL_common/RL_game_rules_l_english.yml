 RULE_OPTION_SOV_CONGRESS_OUTCOME_DEMOCRAT_DESC:0 "The Democrats secure enough influence to elect §YLev Kamenev§! as chairman."
 RULE_OPTION_SOV_CONGRESS_OUTCOME_MILITARY:0 "Red Army Coup"
 RULE_OPTION_SOV_CONGRESS_OUTCOME_MILITARY_DESC:0 "Following a deadlocked Congress, the Red Army under §YMarshal Tukhachevsky§! shall intervene to declare a state of emergency."
 
