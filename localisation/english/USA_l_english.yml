 USA_gerrymandering_category:0 "Gerrymandering"
 USA_gerrymandering_category_desc:0 "Gerrrymandering - verb, to manipulate the boundaries of an electoral constituency so as to favor one party or class.\n\nGerrymandering a state provides a small, permanent bonus to the selected party."
