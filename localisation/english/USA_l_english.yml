 USA_physical_development_desc:0 ""
 USA_uranium_fever:0 "Uranium Fever"
 USA_uranium_fever_desc:0 "There are four known sources of uranium in the world currently; and the first is right here in Colorado. Another is conveniently located just to our north, in Canada. The third is in Bohemia, and the fourth, in the Congo. We will need to acquire as much uranium as possible in order to make nuclear power a reality."
 USA_going_critical:0 "Going Critical"
 USA_going_critical_desc:0 ""
 USA_begin_assembly:0 "Begin the Assembly"
 USA_begin_assembly_desc:0 "The time has come. We have the theory, we have the material. We can now begin assembling a test version of the weapon."
 USA_the_power_of_god:0 "The Power of God"
 USA_the_power_of_god_desc:0 "We knew the world would not be the same. A few people laughed, a few people cried. Most people were silent. I remembered the line from the Hindu scripture, the Bhagavad Gita; Vishnu is trying to persuade the Prince that he should do his duty and, to impress him, takes on his multi-armed form and says, 'Now I am become Death, the destroyer of worlds.'"
 
