 USA_managing_spa:0 "Managing the Party"
 USA_managing_spa_desc:0 "There is no word more terrifying to a man of the left than the dreaded "factionalism". Unfortunately for the §RSocialist Party of America§!, there exist not one, but three distinct factions, each vying for control of the party.\n\nMaintaining the unity of the party is of the utmost importance. Allowing divisions to grow out of control could result in disastrous electoral consequences."
