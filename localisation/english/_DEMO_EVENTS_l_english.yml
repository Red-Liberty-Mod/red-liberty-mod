l_english:
demo_mex.3.t:0 "The Cristiada Intensifies!"
 demo_mex.3.d:0 "As the persecution of the Catholic Church in Mexico has steadly intensified, with the enactment of "the Law for Reforming the Penal Code", or more commonly known as "The Calles Law", the first docile and tamed protests demanding for an equitable and peaceful solution to the christian persecution has been overrun by the radical Cristero groups, calling for the redemption of the Holy See from the percieved Satanist government in Mexico city, with reports coming from churches from Guadalajara, and a state of emergency being declared in Los Altos state, the cries of "Viva Cristo Rey! Viva la Virgen de Guadulpe" have become deafening to Mexican authorities. Whether the conflict will be resolved in a timely manner, or pressures from Uncle Sam next door will halt the conflict remains to be seen."
  demo_mex.3.a:0 "Sure hope they don't find a picture of Jesús in my Sombrero...""
 demo_ita.3.title:0 "Italian Victory in Ethiopia!"
 demo_ita.3.desc:0 "It came as a surprise to many that the inevitable surrender of the Ethiopian Forces was met with no applause nor celebration. The gruelling war in East Africa, rarely waged on clean, fair lines of combat - but rather by methods of guerilla raids and the extensive usage of chemical warfare, ended as Italian Forces entering the Ethiopian capital of Addis Ababa were met with scattered resistance from the Kebur Zabagna, who were quickly rooted out of the city with gas and overwhelming bombardment rather than risk Italian infantrymen’s lives on the husk of the formerly beautiful East African capital. With the total surrender of His Imperial Majesties troops, Ethiopia, and its independence, is gone."
 
 demo_cen.2.title:0 "Central America United!"
 demo_cen.2.desc:0 "The [CEN.GetName], previously an idea long gone in the eyes of those in the New World, is now an emergent power unified and ready to stand its ground on the world stage. Consisting of all Central American nations with the notable exceptions of Panama and El Salvador, these neighbours have decided to band together, uniting under the common goal of enforcing their sovereignty and bringing their larger economy onto the world stage for mutual benefit.The amount of influence this region will exert under their new government has yet to be seen, let alone if its neighbours will continue to allow its existence. Only time will tell how nearby nations will react, chiefly the United States and Mexico."
 
 demo_cen.4.title:0 "War in Central America!"
 demo_cen.4.desc:0 "The [CEN.GetName] is a mildly misleading name, as it implies the entire region is under their flag. However, one notably loud exception remains - the nation of El Salvador. Multiple diplomatic attempts have been made to bring this outlier into the fold, yet all have failed, alongside every peaceful method of integration or coaxing towards union. So the final option has been brought forward; a war to unify Central America under a single banner.\n\nDespite its small size, El Salvador is anything but a pushover - boasting an army rivalling that of the unified state they now stand against, due to their military junta pushing a large militant and fanatic population into the ranks of the army with little to no training."
 
demo_ger_civil_war.1.t:0 "The German People's Rebel"
demo_ger_civil_war.1.d:0 "What appeared to have been mere civil disobedience amongst the civilian population, now it has become clear that Opportunistic, Extremist, and ad hoc tendencies have sent shockwaves throughout german society, with reports of friends and family among communities ending one's lives rather than fight one another. What is clear with the civil strife amongst Germans, unlike 1848 or the Malayse of the Great War is that this isn't a war for establishing a greater, more honorable Germany, rather, for the survival of the German nation itself"
demo_ger_civil_war.1.a:0 "War devours what peace accomplishes"

demo.ita_alb_war.1.t:0 "The Adriatic on fire"
demo_ita_alb_war.1.d:0 "It is no secret to Europeans that Italy has dreamt since the days of antiquity of reclaiming it's foothold in it's backyard own backyard, with Albania being a vital and rather straightforward way to reach these objectives of reclaiming it's imperial glory, and undoing the wrongs of the abyssmal Vlore war. Whether the Albanians can reachieve the successes in establishing it's nascent state, or perhaps has it ran out of fortuity?"
demo_ita_alb_war.1.a.:0 "What is Lupa without the wings of Verbt?"

demo.ita_Victory.1.t:0 "The Italian foothold"
demo.ita_Victory.1.d:0 "At the early rising of the Morn, Italian troops have proclaimed their ubiquitous rule over the lands of the inner Dalmatians, with Italian soldiers chanting "gloria ai soldati sabaudi" in commemoration of their ancestors and the Savoyan Spirit. With splinter cells in the country side actively repulshing Italian rule, especially in the regions of Vlore as expected, however, the question of the Albanian spirit of independence has apparentely, and rather dimly, fizzled away, perhaps forever"
demo.ita_Victory.1.a:0 "the lands of Marcellinus reclaimed"

demo.alb_Victory.1.t:0 "The Albanian eagle soars"
demo.alb_Victory.1.d:0 "In a shocking twist of tables, reports have come from Tirana of the proclamation of the last Italian transport fleeing the beachead, with artillery bombardment being the last humilating sound the remaining troops fleeing their lives to return to the other side of the Adriatic. With this great humiliation, Italian civilians have chastsised the returning men as 'cocks with no beak', with their victorious enemies openly celebrating in awe their nation's endurance and vestige, showing that the Albanian nation isn't a mere myth" 
demo.alb_Victory.1.a:0 "Skanderberg's spirit has saved the Albanians once more"

demo.ita_gre_war.1.t.0 "Epirus-Vlore skirmishes escalate to war"
demo.ita_gre_war.1.d.0 "Beginning as insidiously benign mockery of one another across, with Greek soldiers on low alert, has suddenly changed gears, as confirmations of Italian men crossing the Vjosë, with further reports of Italian shore bombardment on lower epirus. The question of whether the Italian army has been able to recover from it's meagre history of wars and cast away the doubts that many Europeans have of it's ineptitude, and or whether or not the Hellenic forces will rectify the Pyrrhic wars of antiquity is eagerly awaited by observers."
demo.ita_gre_war.1.a.0 "Can the Valor of Pyrrhus save the Greeks now?"

demo.Ita_Victory.1.t.0 "The surrender of Athina and her people"
demo.Ita_Victory.1.d.0 "The scourging scent of fumes, the smell of corpses on the streets of Athina, and the destruction of the Acropolis of Athens, has dolefully affected even the Italian troops on the ground. Nonetheless, Italian rejuvenation at home has been proclaimed, and the question of whether the Eagle could snip the wings of the Owl of Athena has been settled on the battlefield, with the cries of Hellenia cast aside by the Gods of Old... "
demo.Ita_Victory.1.a.0 "I to die, or you to live, only god knows best..."

demo.Gre_Victory.1.t.0 "The Pyrrhic redemption"
demo.Gre_Victory.1.d.0 "Seen largely as the underdogs of the war, and perhaps destined to the same fate of Epirus and her people, the Greek forces have routed Italian forces on the field, with the humiliating evacuation of Italian forces from the Greek archipelago. Cheers and tears from the streets of Salonika to the Patriotic Chants of Sparta tremble the air of Greece, and her people have once again shown their determination to independence, and their fighting spirit has once again shown how they have endured the thousands of years of European civilisation."
demo.Gre_Victory.1.a.0 "Inside Gjirokastër, the flag of Greece now flies..."

demo.Rus_Ger_war_declaration.1.t.0 "The Russian bear tramps into her backyard"
demo.Rus_Ger_war_declaration.1.d.0 "The unsteady silence in the eastern hinterlands of Europe has been broken. It was only expected that Russia and her vast nostalgia for her imperial possessions and might would seek to reclaim their own backyard from the germans, however the huns, previously the masters that orchestrated the defeat of the almost unstoppable slavic horde at tannenburg, mirroring the Polish victory at Legnica against the Mongols, seems to have lost their flare in recent years, with internal strife and an overburdened wehrmacht in the east and west alike, whether or not the German establishment can not just replicate their glory of old, but mantain it shall be tested, in fire and in blood, the east is once more aflame."
demo.Rus_Ger_war_declaration.1.a.0 "Peace through domination, or through extinction"

demo.Ger_Rus_war_declaration.1.t.0 "The Prussian eagle strikes again"
demo.Ger_Rus_war_declaration.1.d.0 "Unsuspectedly, or rather, admirably, what was seen as an empire overstretched to their limit has decided to go on the offense, responding to repeated calls by the wehrmacht to act first against Russian provocation, the German armada has crossed the boundaries established in Brest-Litovsky, catching the Russian bear off their balance. Although a bold move by the German ruling class, it is to be seen whether the people of Germany and other empires who watch this conflict will take the opportunity in the case of German blemishes on the battlefield to enforce their own agendas, for an Eagle with a crippled wing can not remain in the air for long."
demo.Ger_Rus_war_declaration.1.a.0 "Where the huns have passed, grass will never grow again."

demo.Sov_Rus_Civil_War.t:0 "Russian embroiled in it's second civil war"
demo.Sov_Rus_Civil_War.d:0 "With the news of Kolchak's grip on Vladivostok seemingly evaporating in a fortnight, as the Russian sailors, unlike their German counterparts in Holstein, managed to take control over the city and it's surrounding army caches, declaring Kolchak a "menace to the workers of Siberia", the Bukharinist government has eyed the situation with glee; an opportunity to finish what was started.\n\nThe Second Russian civil war is predicted to be as bloody as the first, with families on both sides of the divide having to raise their arms for the ideologues representing them once again, it is clear  that the dreariness of Russia and it's people has permeated thourghouly, whether right or wrong, each side knows that the question of the legitimate rulers of Moscow will be costly."
demo.Sov_Rus_Civil_War.a:0 "Whether you're a White or a Red, we're all Russians... "

demo.Second_Great_War.t:0 "The clash of the Imperiums of Civilisation"
demo.Second_Great_War.d:0 "At last, the predicted judgement day, predicted by the militant speeches of François de la Rocque  and his euphorically passionate base of French crowds that gathered at the Bastille on the news of the declaration of war against the Prussian Eagle, the flails of liberalism that seemed to have kept nationalism at bay for the period following the first major European conflict in a centurian has finally given way to unequivocal irredentism.\n\nIn respone to the French dispos calls for their unlikely ally in the Isles to intervene, the UK parliament has also voiced their intentions to join on the side of France in the conflict against the predisposed European juggernaut that lay in Berlin, even with the seemingly close dynastic ties of these two nations, it would appear that the obligation of the English to restore the European balance of power in their favour would have to be met before they would ever consider to rescind into self inflicted isolation from the continent.\n\nWhat appears to be lacking on both sides of the conflict is enthusiasm from the workers of these nations, as the strong anti-war movement that had grown following the great conflict of the 20th century that developed inspired by the socialist movement in the North American Basin has disollusioned many industrial working class families to come out of support for their government's decision to respond to the prospects of more blood being shed.\n\nAlas, whilst many may not die for their heads of state, they will for sure follow the calls of their forefathers to lay their arms in the plains of Picardy and beyond if it ensures their national existence."
demo.Second_Great_War.a:0 "And so the temptation of glory draws Europe to war once more..."

demo.Italy_Intervenes_In_Great_War.t:0 "The kingmaker chooses the Eagle"
demo.Italy_Intervenes_In_Great_War.d:0 "Even more earth shattering news has come from the European continent, this time from the Mediterranean, as Italian ships have been seen bombarding naval bases in both Sardinia and in Toulouse, with air raids being reported on the island of Malta, as the Italian government shortly after has issued an official declaration of war againt the revanchist entente powers.\n\nCalled on by the press, the charismatic Duce (GetLeader) has stated the intentions of the Italian government are to "merely fulfill the destiny that was robbed from it during the years of division that the French dogs imposed on use for centuries" and that Italy shall be "rejuvinated for the people's of Italia and those who wish to follow by example her rich and lucious culture and civic institutions that govern her vast beauty."\n\nMany see this as the decisive pawn that the Germans can use to crush the belligerent French and British governments in Paris and London, although whether or not the Italian army can push through the alps and secure her geopolitical goals in the war remains to be decided."
demo.Italy_Intervenes_In_Great_War.a:0 "Only through war can Italia redeem herself."