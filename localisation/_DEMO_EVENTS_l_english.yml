 demo_ita.3.title:0 "Italian Victory in Ethiopia!"
 demo_ita.3.desc:0 "It came as a surprise to many that the inevitable surrender of the Ethiopian Forces was met with no applause nor celebration. The gruelling war in East Africa, rarely waged on clean, fair lines of combat - but rather by methods of guerilla raids and the extensive usage of chemical warfare, ended as Italian Forces entering the Ethiopian capital of Addis Ababa were met with scattered resistance from the Kebur Zabagna, who were quickly rooted out of the city with gas and overwhelming bombardment rather than risk Italian infantrymen’s lives on the husk of the formerly beautiful East African capital. With the total surrender of His Imperial Majesties troops, Ethiopia, and its independence, is gone."
 
 demo_cen.2.title:0 "Central America United!"
 demo_cen.2.desc:0 "The [CEN.GetName], previously an idea long gone in the eyes of those in the New World, is now an emergent power unified and ready to stand its ground on the world stage. Consisting of all Central American nations with the notable exceptions of Panama and El Salvador, these neighbours have decided to band together, uniting under the common goal of enforcing their sovereignty and bringing their larger economy onto the world stage for mutual benefit.The amount of influence this region will exert under their new government has yet to be seen, let alone if its neighbours will continue to allow its existence. Only time will tell how nearby nations will react, chiefly the United States and Mexico."
 
 demo_cen.4.title:0 "War in Central America!"
 demo_cen.4.desc:0 "The [CEN.GetName] is a mildly misleading name, as it implies the entire region is under their flag. However, one notably loud exception remains - the nation of El Salvador. Multiple diplomatic attempts have been made to bring this outlier into the fold, yet all have failed, alongside every peaceful method of integration or coaxing towards union. So the final option has been brought forward; a war to unify Central America under a single banner.\n\nDespite its small size, El Salvador is anything but a pushover - boasting an army rivalling that of the unified state they now stand against, due to their military junta pushing a large militant and fanatic population into the ranks of the army with little to no training."
 
demo_ger_civil_war.1.t:0 "The German People's Rebel"
demo_ger_civil_war.1.d:0 "What appeared to have been mere civil disobedience amongst the civilian population, now it has become clear that Opportunistic, Extremist, and ad hoc tendencies have sent shockwaves throughout german society, with reports of friends and family among communities ending one's lives rather than fight one another. What is clear with the civil strife amongst Germans, unlike 1848 or the Malayse of the Great War is that this isn't a war for establishing a greater, more honorable Germany, rather, for the survival of the German nation itself"
demo_ger_civil_war.1.a:0 "War devours what peace accomplishes"

demo.ita_alb_war.1.t:0 "The Adriatic on fire"
demo_ita_alb_war.1.d:0 "It is no secret to Europeans that Italy has dreamt since the days of antiquity of reclaiming it's foothold in it's backyard own backyard, with Albania being a vital and rather straightforward way to reach these objectives of reclaiming it's imperial glory, and undoing the wrongs of the abyssmal Vlore war. Whether the Albanians can reachieve the successes in establishing it's nascent state, or perhaps has it ran out of fortuity?"
demo_ita_alb_war.1.a.:0 "What is Lupa without the wings of Verbt?"

demo.ita_Victory.1.t:0 "The Italian foothold"
demo.ita_Victory.1.d:0 "At the early rising of the Morn, Italian troops have proclaimed their ubiquitous rule over the lands of the inner Dalmatians, with Italian soldiers chanting "gloria ai soldati sabaudi" in commemoration of their ancestors and the Savoyan Spirit. With splinter cells in the country side actively repulshing Italian rule, especially in the regions of Vlore as expected, however, the question of the Albanian spirit of independence has apparentely, and rather dimly, fizzled away, perhaps forever"
demo.ita_Victory.1.a:0 "the lands of Marcellinus reclaimed"

demo.alb_Victory.1.t:0 "The Albanian eagle soars"
demo.alb_Victory.1.d:0 "In a shocking twist of tables, reports have come from Tirana of the proclamation of the last Italian transport fleeing the beachead, with artillery bombardment being the last humilating sound the remaining troops fleeing their lives to return to the other side of the Adriatic. With this great humiliation, Italian civilians have chastsised the returning men as 'cocks with no beak', with their victorious enemies openly celebrating in awe their nation's endurance and vestige, showing that the Albanian nation isn't a mere myth" 
demo.alb_Victory.1.a:0 "Skanderberg's spirit has saved the Albanians once more"


