 CAN_favoured_son:0 "The Favoured Son of Empire"
 CAN_favoured_son_desc:0 "The British Empire is supposedly an entity which sees multiple states and their imperial possession’s united within it. The United Kingdom is obviously the head of this great imperial family, however, the aftermath of the Great War has left London weak both economically and militarily. London now turns to its Dominions for support; more so to Canada then the others. Canada is unlike the other Dominions within the Empire. Canada is the prince of the Empire.\n\nCanadian forces in the war didn’t fail their operations, paving the way to many Canadian officers being welcomed to the Imperial staff in London. Canada’s proximity to the Home Isles compared to the other Dominions has seen the Canadian economy boom with new flourishing industries such as the motor industry. Britain’s reliance on Canadian exports to fill the gap in the home market alongside Canadians becoming more present in the planning of Imperial operations has seen Canada become the de facto heir of the Empire. This new prestige has given Canada new standing in the British Commonwealth, giving Canada more sway on the Imperial stage but also suspicion from traditionalists in London and other Dominion’s who wish to replace the oldest son as Britain’s favourite son."
 CAN_booming_economy:0 "Booming Economy"
 CAN_booming_economy_desc:0 "Canada after the Great War was much like Britain after the Great War. Her economy chugged along till 1929 when the depression hit America. Trade with America had always been high and the sudden drop in demand alongside the passing of the Smooth-Hawley tariff brough Canada’s economy to a screeching halt. A lack of demand from their biggest trading partner saw the oldest son of the Empire struggle. However the 1931 Sterling crash changed the fate of the Canadian economy.\n\nThe 1931 Pound Sterling crash in Britain saw many British businesses close due to economic hardships. The lack of supply in Britain coinciding with a large demand in England forced Britain to turn to her Empire for economic relief and who else did Britain turn to but Canada. Now the Canadian economy has been booming for the last five years with Canada exporting large quantities of new goods such as Cars to Britain and the other Dominions. Canada stands at the peak of economic success but everyone knows; good things don’t last forever."
 CAN_quebec_divide:0 "The Quebec Divide"
 CAN_quebec_divide_desc:0 "Canada fought alongside her mother nation in the Great War in the name of the Empire. The battles of Ypres, Somme and Paschendale saw many of our young men die on the fields of France and Flanders. However Canada could not falter in front of her brother Dominions and Britain. Therefore in 1917, the government enacted a conscription act to send more men to the frontlines. The loyal sons of the Empire answered the call to arms in the name of loyalty to the Empire, however many French Canadians refused the call to arms.\n\nThey argued that the war which Canada was fighting was that of Anglo imperialism. Why should a son of Quebec die for Anglo interests, when the Anglo yoke oppressed them at home, was the battle cry of many French Canadians. The initial riots were ultimately dispersed by military police which timely occurred alongside the end of the war in 1919. However, the Quebecois have not forgotten this ‘transgression’ against their people. Quebec nationalism is still being stoked nearly a decade and a half later by men such as Premier of Quebec Maurice Duplessis, who now beats the war drums of Quebecois independence. These acts of nationalism must be stopped before they escalate, which could threaten Canada’s newfound standing within the Commonwealth, and maybe even the concept of a united Canada itself."
 CAN_quebec_divide_tt:0 "§RQuebecois aggression must be quelled quickly, before the province ends up in revolt against our administration.§!"
 
