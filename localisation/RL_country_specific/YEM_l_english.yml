 ### Ideas ###
 YEM_turkish_officers:0 "Turkish Officers"
 YEM_turkish_officers_desc:0 "Since the fall of the Ottoman Empire, Imam Yahya has kept a cadre of 300 Turkish officers to train the Yemeni armed forces."
 YEM_fragmented_armed_forces:0 "Fragmented Armed Forces"
 YEM_fragmented_armed_forces_desc:0 "As a result of Iman Yahya's distrust of his Turkish complement of officers, there exist multiple seperate army organizations in Yemen. The al-Ukfah, or royal guard, consists of hand-picked men absolutely loyal to the Imam. The regular army, established after the Great War, relies heavily on tribal mercenaries under the command of their own leaders, the so-called colonel sheikhs. Finally, the Jaysh al-Barani, or Desert Army, is an irregular militia composed of tribesmen from the Zaydi highlands in the north. Naturally, multiple organizations operating in parallel with seperate command structures lends itself to extreme disorganization."
 
