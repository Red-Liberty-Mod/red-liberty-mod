 ### Ideas ###
 IRQ_ethnic_tension: "Ethno-Religious Tension"
 IRQ_ethnic_tension_desc: "While the majority of Iraqis are Shia Arabs, they primarily inhabit the Lower Mesopotamia region. Upper Mesopotamia, however, is a different story. Although the region's population makes up barely half of Iraq's total, it is significantly more diverse, home to Sunni Arabs, Shia Arabs, Kurds, Turks and minority communities like Assyrian and Armenian Christians. Despite this diversity, the King has surrounded himself almost exclusively with Arabs, predominantly Shia, which has created a sense of Shia political dominance and Kurdish suppression. This dynamic has marginalized the political influence of other groups, even though Shia Arabs constitute about two-thirds of the population, it is still an issue."
 IRQ_khazal_gamble: "Khazal's Gamble"
 IRQ_khazal_gamble_desc: "Like urban populations elsewhere, Iraqis are demanding full participation in politics and decision-making—rights that the King continues to deny. Although Iraq once had elections and a functioning parliament, the King suspended it following the Sunni Arab and Kurdish strikes of 1935, which called for fair representation. The people's desire for democracy is growing, and it seems inevitable that all segments of society will eventually unite against this injustice. If King Khazal does not restore the parliament, the Kingdom risks descending into widespread civil unrest. He could alternatively use this year to improve relations with the military and the clergy, ensuring they do not side with the people, thereby cementing his iron grip over the country."

 IRQ_treaty_tt: "§YThe Treaty grants Britain military and market access§!"
 IRQ_1922_Anglo_Iraqi_treaty: "Anglo-Iraqi Treaty"
 IRQ_1922_Anglo_Iraqi_treaty_desc: "Following the 1920 revolution and the French deal with Faisal's army to betray him, the Iranian revolution that overthrew the Shah, the British decided to ignore the will of the people to appoint Faisal as King of Iraq but rather forced Khazal as the only and prime candidate for King of Iraq, therefore Ahwaz joined Iraq and Khazal became King, this of course angered the Sunni Arabs and Kurds whose opinion wasn't heard and then the British allowed for elections but Khazal interfered heavily and in 1924 when the assembly gathered to draft a constitution he and the British forced them to co-sign the 1922 treaty which gave the British full military access and full control over the oil industry therefore making the Anglo-Arab Oil Company (Formerly the Anglo-Persian Oil Company) control the Iraqi economy."
#events
iraq.15.t: "Iraqi Revolution"
iraq.15.d: "An unexpected turn of events, the Kingdom of Iraq is currently in chaos and the nation is in an open revolt against it's monarchy, reports of King Khazal gathering his supporters in Ahwaz to face off the revolutionaries. \nThe revolution is said to be peaceful for now led in majority by the Social Democrats in Jama'at Al Ahali and Democratic Socialists in Hizb Al Umma with the communist party playing a large role in the revolt, the Ulema in Najaf isn't very pleased with communism nor are the Pro Hashmite conservatives and militarists. \nThe country is currently with no centralized leadership and in risk of an Anglo-French invasion to secure their Oil fields, investments and interests in the Middle East in general and in Iraq especially."
iraq.15.a: "Dauna Nudeen Al Alam Al Qaddem!"

 