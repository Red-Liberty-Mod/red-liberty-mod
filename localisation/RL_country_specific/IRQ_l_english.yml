#events
iraq.15.t: "Iraqi Revolution"
iraq.15.d: "An unexpected turn of events, the Kingdom of Iraq is currently in chaos and the nation is in an open revolt against it's monarchy, reports of King Khazal gathering his supporters in Ahwaz to face off the revolutionaries. \nThe revolution is said to be peaceful for now led in majority by the Social Democrats in Jama'at Al Ahali and Democratic Socialists in Hizb Al Umma with the communist party playing a large role in the revolt, the Ulema in Najaf isn't very pleased with communism nor are the Pro Hashmite conservatives and militarists. \nThe country is currently with no centralized leadership and in risk of an Anglo-French invasion to secure their Oil fields, investments and interests in the Middle East in general and in Iraq especially."
iraq.15.a: "Dauna Nudeen Al Alam Al Qaddem!"

 