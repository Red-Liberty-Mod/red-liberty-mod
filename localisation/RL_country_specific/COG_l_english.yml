 ### Ideas ###
 COG_king_leopolds_ghost:0 "King Leopold's Ghost"
 COG_king_leopolds_ghost_desc:0 "Though the absolute worst days of Belgian rule over the Congo are over, the native population still suffers. Forced labor is still a common practice, and any anti-colonial sentiment is repressed harshly."
 COG_heart_of_darkness:0 "Heart of Darkness"
 COG_heart_of_darkness_desc:0 "The Congo is a truly vast place. A tiny nation such as Belgium simply lacks the resources to properly police all its territory, and relies on foreign mercenaries to fill in the gaps."
 COG_extreme_centralization:0 "Extreme Centralization"
 COG_extreme_centralization_desc:0 "Born of the Belgian government's relative apathy towards the inner workings of the colony, political power rests entirely with a small clique of individuals appointed by the colonial ministry."
 
