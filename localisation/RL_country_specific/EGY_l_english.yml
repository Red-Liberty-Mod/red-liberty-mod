 ### Ideas ###
 EGY_massive_inequality:0 "Massive Inequality"
 EGY_massive_inequality_desc:0 "Egypt, often called the mother of the world, bears the weight of centuries of humiliation. Foreign domination systematically plundered its resources, ravaged its cultural heritage and deepened economic and social inequality. During the Mamluk and Ottoman eras, a Turco-Caucasian aristocracy arose, consolidating power and sidelining the state. Even Muhammad Ali's infamous castle massacre, intended to break this elite, merely replaced the Mamluks with Ottoman Turkish and Albanian officers and statesmen. When Egypt gained nominal independence from the Ottomans, this entrenched aristocracy not only persisted but thrived, tightening its grip over the rural population and perpetuating a cycle of exploitation and inequality."
 EGY_Fuad_I_idea:0 "Fuad I"
 EGY_1923_constitution: "The 1923 Constitution"
 EGY_1923_constitution_desc: "Following the Great Revolt of 1919-1920, spurred by the aftermath of the Great War and bolstered by German support, the Egyptian people compelled the British to grant them greater rights. This pressure culminated in Egypt achieving nominal independence in 1923, though Britain retained certain privileges, including control over the Suez Canal. That same year, the Declaration of Independence was proclaimed, and a new constitution was drafted, limiting the powers of the King while strengthening those of the Prime Minister and Parliament.\n\n However, corruption scandals, political infighting, and the failure of Parliament to address rampant inequality and lingering colonial issues eroded public trust. In response, the military, led by Arab Revolt hero and anti-Ottoman activist Aziz Ali al-Misri, staged a coup, suspending the constitution and dissolving Parliament. While Aziz Ali remains a popular figure, and his tenure has brought some improvements, many Egyptians resent the suspension of the constitution and the loss of civil liberties, leaving the nation divided between hope for progress and a yearning for democracy."
 EGY_1923_constitution_2: "The 1923 Constitution"
 EGY_1923_constitution_2_desc: "Following the Great Revolt of 1919-1920, spurred by the aftermath of the Great War and bolstered by German support, the Egyptian people compelled the British to grant them greater rights. This pressure culminated in Egypt achieving nominal independence in 1923, though Britain retained certain privileges, including control over the Suez Canal. That same year, the Declaration of Independence was proclaimed, and a new constitution was drafted, limiting the powers of the King while strengthening those of the Prime Minister and Parliament."
 EGY_1936_constitution: "The 1936 Constitution"
 EGY_1936_constitution_desc: "Following the Great Revolt of 1919-1920, spurred by the aftermath of the Great War and bolstered by German support, the Egyptian people compelled the British to grant them greater rights. This pressure culminated in Egypt achieving nominal independence in 1923, though Britain retained certain privileges, including control over the Suez Canal. That same year, the Declaration of Independence was proclaimed, and a new constitution was drafted, limiting the powers of the King while strengthening those of the Prime Minister and Parliament.\n\n However, the 1923 constitution proved incompatible with the new military regime under Aziz Ali. As a result, the 1936 constitution replaced it, granting expanded powers to Aziz Ali's position and further consolidating the role of the military in governance. The new framework restructured the state to align with military priorities and reforms, effectively transforming Egypt into a nation where the army has a state not the other way around."
