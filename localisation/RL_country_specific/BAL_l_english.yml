 ### Ideas ###
 BAL_ethnic_conflict:0 "Unnatural Foundation"
 BAL_ethnic_conflict_desc:0 "The lands of the Duchy are a strange place, where noble titles and strange rituals call back to a time lost to memory. More than anything else, it represents a tradition, unbroken since the time of the Northern Crusades. A tradition that, if the nobles and knighthoods have their way, will never be broken.\n\nUnder the surface, a tension simmers. Barely a modern nation-state, the duchy was built by Germans, for Germans, at the expense of the Latvians and Estonians that make up a majority of its people. Against communists and nationalists alike, if the duchy is to survive, it must change. And yet, how can it?"
 BAL_militaristic_society:0 "The Watch in the East"
 BAL_militaristic_society_desc:0 "The United Baltic Duchy represents the first line of defense against the Russian hordes of the east. Since the middle ages, it is the German noble orders who have stood watch here. Against the Mongols, the Muscovites, and now the Communists it has stood.\n\nShould its defenders fail, the road to the rest of Europe would stand wide open, a wave of red washing over field and farm. It is for this reason: the watch must never fall."
 
 
