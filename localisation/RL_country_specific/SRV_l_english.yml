 ###Leader Descriptions
 
 HOCHIMINHDESC:0 "Ho Chi Minh was born as Nguyen Sinh Cung in 1890 in the village of Lang Chua or Hoàng Tru in Kim Lien commune, Nghe An province, in Central Vietnam which was then a French protectorate. In Saigon, he applied to work as a kitchen helper on a French merchant steamer, the Amiral de Latouche-Tréville, using the alias Văn Ba. The ship departed on 5 June 1911 and arrived in Marseille, France on 5 July 1911. The ship then left for Le Havre and Dunkirk, returning to Marseille in mid-September. There, he applied for the French Colonial Administrative School, but his application was rejected. He instead decided to begin traveling the world by working on ships and visiting many countries from 1911 to 1917. Ho would go on to travel to the US and Britain. Whilst France collapsed from its loss in WW1, he attended the formation of the French Communist Party in 1920, noticing his nation's situation, he would meet up with other indochinese revolutionaries in which called for the removal of the oppressive reaction leaders in the region. By this time also he started to help plan the formation of the Vietminh in which he would be a general and would fight in Indochina with his comrades. By the point in time in 1925 he changed his name to Ho Chi Minh(Bringer of Light) with his former being Nguyen Sinh Cung. Now he his hides in the depths of the Vietnamese jungles, waiting for his revolutionary light to shine on him." 
 
 ###Ideas
 
 SRV_la_lutte_agitation_2:0 "La Lutte Resistance"
 SRV_la_lutte_agitation_2_desc:0 "A splinter group from the Vietminh, who targets the urbanites. Its a non violent group(from what we see and know) that ends up sending news papers that agitate protestors and further grow their support against our imperial government. These leftwing nationalists, seek reglory for Vietnam under socialism, and encourage a socialist Vietnam independent from an Indochinese union."
 SRV_republican_agitation:0 "Republican Agitation"
 SRV_republican_agitation_desc:0 "After the collapse of French colonialism in the region, the ICP faces opposition from a group that is influenced by Japanese pan-asianism and anti-imperialism. VNQDD is a kuomintang based group that applies tridenism to Vietnam. As of recent turmoil they have backed and started protests that seem to attack the royal family and Vietminh."
 SRV_the_gang_of_four:0 "The Gang of Four"
 SRV_the_gang_of_four_desc:0 "The so called 'Gang of Four' are the main leadership of the Indochinese Communist Party, with each leader being a representative of each faction. From the far left the anarchist Nguyen Anh Ninh, to the Leninist Ha Huy Tap, with the libertarian Tou Soammouth to the popular Vietnamese revolutionary Ho Chi Minh and his marxist faction. The gang itself has internal disputes but ultimately keeps a united front strong as to deter any sought of dividing factionalism whilst in the midst of a revolution."
 SRV_support_from_country_side:0 "Support From the Peasants"
 SRV_support_from_country_side_desc:0 "The peasantry have long been exploited by feudal capitalists for century, at the start of the Vietminh, many Vietminh soldiers would adopt a policy of helping the peasants. This help ranged from medical care to preventing landlord exploitation. Due to this the ICP program is tended more to peasantry but does alienate some of the urbanite workers. but with support from the local peasantry the Vietminh are able to hide in plane sight and are able to launch attacks from based from all rural areas in Indochina."
 
