 indochina_revolution.1.desc:0 "In 1919, after the French lost control over all of Indochina; due to the cost of running the area and loss of the first world war, scholars and political intellectuals fled to Paris to engage and discuss in political thought. In a Vietnamese, Cambodian and Laotian sectors of Paris are a meeting of political intellectuals in a small Parisian apartment. These figures were Ho Chi Minh, Nguyen An Ninh,  Tou Sammouth and Ha Huy Tap, each mainly from the Vietnamese region except for Tou Sammouth who is Cambodian . Together they planned to create the Indochinese Communist Party. In 1922 the ICP’s official congress started in Paris with all sides agreeing that armed conflict should be made to start the Indochinese socialist revolution. \n\n Tho due to the chaos in France at the time the ICP moved to the US in which they did secret planning for their ultimate uprising.This leads to the formation of the Viet Minh with a 1,000 strong army in which were formed by exiles who were against the current rulers of the Indochinese nations. The fighters would sneak into Indochina and start their operations, and were rapidly growing in size. With also an unaccounted number of spies for the Viet Minh  are spread all across Indochina, gathering contacts and starting small uprisings. \n\n The Viet Minh armed forces itself started to gain recruits after visiting the peasants and teaching them in the way of Marx and the ICP. By 1936 the party was gearing up for another congress for party leadership and the preparation for the full uprising."
 indochina_revolution.100.b:0 "§r Dang Cong san Dong Duong Quang Vinh Muon Nam!§!"
 indochina_revolution.100.desc:0 "As night passes on shots fire across Southern Indochina. Local villages taking up arm against a new enemy, seeking to enslave them. As the night rushes on, it becomes ever clear that the 'Uprising' has occurred.\n\n Vietminh troops gather with in Southern Laos, Northern Cambodia, parts of Southern Vietnam. Villages pledging support to Uncle Ho's revolutionary cause of liberation. As per response of the governments in the region, all 3 countries(Laos, Vietnam and Cambodia) respond with hell unleashed upon the civilians. Thousands are shot without cause. As a result more join the Vietminh forces. The country now faces anarchy as violence engulfs Indochina."
 
