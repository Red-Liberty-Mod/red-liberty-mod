 la_luttle_revolution.1.desc:0 "La Lutte started as a small sub group of the Indochinese Communist Party in Paris and gave itself the French name 'La Lutte' meaning 'The Struggle' , as to reach out those in Vietnam and France. By 1922 with the ICP hold a less nationalistic stance, La Lutte had a schism as its heads were expelled from the party, this causing its dissolution by the ICP in 1923, after that point La Lutte would reform into a left nationalist party that would work with in Vietnam's monarchist system. The presence of La Lutte would be tolerated by Bao Dai's court, as it was a symbol of disunity that could be used to draw away Vietminh members and also be useful in the bolstering of local nationalist thought that would be seen as indirect support for the nationalism promoted by the monarchy. Tho after 1929, la Lutte has become more agitative in it's role in union organization and strikes, thing sparks debate with in the government on whether to ban them or not. \n\n As per now the La Lutte organization has been launching new publishing campaigns in their news papers since 1931, calling for changes to all of Vietnam. But yet also there becomes an increasing number from strikes that seem to devastate some areas of the local economy. But also their activity as a party has died down in the public eye which maybe of concern to Bao Dai's government."
