 ### Characters ###
 SHX_shang_zhen:0 "Shang Zhen"
 SHX_yan_xishan:0 "Yan Xishan"
 POLITICS_YAN_XISHAN_DESC:0 "Yan Xishan, born in Wutai County, Xinzhou, Shanxi, came from a lineage of bankers and merchants; during his youth, he balanced work at his father's bank with a traditional Confucian education. The economic depression of the late 19th century devastated his family's business, prompting Yan to enroll in a military school funded by the Manchu government in Taiyuan. There, he was introduced to Western subjects like mathematics and physics.\n\nContinuing his military education, Yan traveled to Japan in 1904 to study at the Tokyo Shimbu Gakko, a military preparatory academy, later graduating from the Imperial Japanese Army Academy in 1909. Witnessing Japan's rapid modernization, Yan became determined to bring similar progress to his beloved Shanxi.\n\nUpon his return to China, Yan was assigned as a division commander of the New Army in Shanxi in 1909, all while secretly plotting to overthrow the Qing dynasty. Upon the outbreak of the Xinhai Revolution, he led revolutionary forces to expel Manchu troops from Shanxi, declaring the province's independence and promising sweeping reforms.\n\nYan sought to ally with Shanxi revolutionary Wu Luzhen against Yuan Shikai, but Wu's assassination foiled these plans. Elected military governor by his comrades, Yan faced an invasion by Yuan's troops in 1913. He avoided direct confrontation, retreating to Shaanxi and preserving his power base. By aligning with Yuan, Yan was allowed to return as Shanxi's military governor.\n\nAfter Yuan Shikai's death in 1917, Yan cemented his control over Shanxi, ruling unchallenged. By 1936, he faces mild resistance from his top general, Feng Yuxiang, but has thus far remained secure thanks to his ties with the Yuan dynasty."
