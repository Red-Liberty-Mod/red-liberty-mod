 #USA_managing_spa_desc:0 "Over the years, the£GFX_spa_texticon §RSocialist Party of America§! has come to encompass a large coalition of left-wing forces, each with their own ideas as to how socialism must be achieved. Managing these factions is of the utmost importance; allowing divisions to grow out of control could result in disastrous electoral consequences.\n\nThe §rRevolutionary Policy Committee§! represents the hard left, which seeks to transform the party into a revolutionary socialist organization. Uniting radical socialists, socialist laborites, and the few communists that stuck with the party through the 20's, they are willing to stick to electoralism only so long as it provides results.\nThey are [GetSPAMilitantInfluence] ([?SPA_militant_influence_percent|%0Y]).\nTheir approval of our administration is [GetSPAMilitantApproval].\n\nThe §RProgressive Faction§!, representing the center, is an informal grouping of middle-class "intellectual" socialists centered around Norman Thomas. They seek to build an all-inclusive party with broad appeal.\nThey are [GetSPAUnionistInfluence] ([?SPA_unionist_influence_percent|%0Y]).\nTheir approval of our administration is [GetSPAUnionistApproval].\n\nOn the right, the §PConstructive Faction§! favors reformism over revolution, de-emphasizing social theory and revolutionary rhetoric in favor of honest government and efforts to improve public health.\nThey are [GetSPAModerateInfluence] ([?SPA_moderate_influence_percent|%0Y]).\nTheir approval of our administration is [GetSPAModerateApproval].\n\nOverall, the §RSocialist Party§! is [GetSPAUnity]"
 
