 USA_deeply_unpopular:0 "is deeply unpopular"
 
 USA_office_of_the_president_thomas:0 "§YRelief, Recovery, and Reform§!: [GetAgenda1Status]\nThe most immediate issue is that of the Great Depression rocking the country. To remedy this, the President's advisors have devised a three-stage plan of legislation and policy known as "The Three Rs"; short-term relief to restore confidence, mid-term recovery to get the economy back on track, and long-term reform to ensure such a crisis does not occur again.\n\n§YStrengthening of the Federal Government§!: [GetAgenda2Status]\nConservatives in Congress and in the courts have long opposed the necessary reforms the president seeks to bring. Particularly vile is the Supreme Court's usurpation of congressional power known as Judicial Review. Steps must be taken to future-proof our gains, preferably without sliding into dictatorship.\n\n§YExpansion of Civil Rights§!: [GetAgenda3Status]\nBy far the most controversial part of the agenda, civil rights is an issue close to the President's heart."
