 USA_office_of_the_president_desc:0 "Every occupant of the oval office has come into it with their own agenda, their grand promises of reform. Rarely has anyone been able to acheive everything they desired.\n\nThe president's administration [GetPresidentPopularity] ([?USA_president_popularity]).\n\n[GetPresidentAgenda]"
 
