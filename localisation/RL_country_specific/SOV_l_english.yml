 ### Decisions ###
 SOV_factionalism_category:0 "Factionalism"
 SOV_factionalism_category_desc:0 "--§YIndustrialists§!--\nA left faction that opposes the NEP and proposed mechanisms of planning to advance the challenges of stabilization of the food situation and modernization of the army. This faction is an adherent supporter of centralized army control and industrial planning.\n\n--§YRightists§!--\nLed by Grigory Sokolnikov, derided by their enemies as 'ekonomisty' and 'rightists', is a group of pragmatic thinkers, who see the only way out of the situation - to deepen the NEP, loosen regulations on concessions and trade, promote a strong currency and austerity policies for fiscal stabilization, and re-entrance into the global market.\n\n--§YNeo-Decists§!--\nA group oriented on demands of loosening party control over the army and workers. Decists are in favor of cooperating with anarchists and other left-socialist organizations and view the NEP as a mistake and a capitalist restoration.\n\n--§YWorker's Opposition§!--\nAll political power to the Soviets! is the rallying cry of the Worker's Opposition, led by Alexander Shliapnikov. This faction seeks to radically reform the nation along syndicalist lines, granting the job of economic planning to a trade-union congress, and to have the Party remain solely as an ‘overseer’.\n\n--§YDemocratic Group§!--\nLed by 'moderate bolshevik' Lev Kamenev, this faction desires to promote a big-tent socialist party strongly interconnected with the state (making no distinction between the two). All in the pursuit of Kamenev's dream; an RSFSR governed by all the socialist forces, democratically and peacefully."
 
 
