 soviet_union.100.title:0 "Cold Pursuit"
 soviet_union.100.desc:0 "The frigid air hung heavy over the compound as the guards patrolled the premises, their breath crystallizing in the wintry night. Little did they know that within the confines of the once-imposing house arrest, a daring escape had taken place.\n\nIt was in the early hours of dawn when the guards discovered the empty rooms, their eyes widening with disbelief. Panic gripped their hearts as they combed every inch of the estate, hoping to uncover a trace of their former wards. Whispers of their escape permeated the air, spreading like wildfire among the ranks.\n\nAs the news reached the higher echelons of power, fear mingled with fury. How? How could this have happened? Who helped them?\n\nIn the shadows, the young escapees forged a path towards an uncertain future, their spirits aflame with the hope of freedom and the belief that their stolen lives could be reclaimed. Their audacious flight sent shockwaves through a nation, forever etching their names into the annals of history."
 soviet_union.100.a:0 "Damn it all."
 
 sov_congress.1.title:0 "The Opening of the Congress"
 sov_congress.1.desc:0 ""
 sov_congress.1.a:0 "Comrades, one and all."
 SOV_congress_opens:0 "The two factions with the most influence at the end of the Congress will be available to be selected from."
 
 sov_congress.2.title:0 "The New Economic Policy"
 sov_congress.2.desc:0 ""
 sov_congress.2.a:0 "It has worked well so far."
 sov_congress.2.b:0 "Let us end this capitalist mistake."
 
 sov_congress.3.title:0 "The General Secretary's Influence"
 sov_congress.3.desc:0 ""
 sov_congress.3.a:0 "The secretary must be able to steer the party in the proper direction."
 sov_congress.3.b:0 "He is there to manage, nothing more."
 
 sov_congress.4.title:0 "Democratic Centralism"
 sov_congress.4.desc:0 ""
 sov_congress.4.a:0 "We need proper unity."
 sov_congress.4.b:0 "It's fine as it is!"
 sov_congress.4.c:0 "We can't let a small group dictate policy!"
 
 sov_congress.5.title:0 "Oversight of the Army"
 sov_congress.5.desc:0 ""
 sov_congress.5.a:0 "The army must not be a threat."
 sov_congress.5.b:0 "The army should be apolitical."
 
 sov_congress.6.title:0 "The Status of the Unions"
 sov_congress.6.desc:0 ""
 sov_congress.6.a:0 "The workers must have a voice."
 sov_congress.6.b:0 "We cannot concede to mere bureaucrats."
 
 sov_congress.7.title:0 "Our Foreign Policy"
 sov_congress.7.desc:0 ""
 sov_congress.7.a:0 "We need to focus on ourselves."
 sov_congress.7.b:0 "We shall carry the revolution to new heights!"
 
