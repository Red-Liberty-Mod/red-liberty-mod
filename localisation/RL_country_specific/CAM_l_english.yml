 ##ideas##
 CAM_sangkum_influence_balanced:0 "Sangkum Influence: §GBalanced§!"
 CAM_sangkum_influence_balanced_desc:0 "The Sangkum is an organisation that is supported by the crown prince Sihanouk. The organisation itself relies on ideas of crony socialism mixed with Khmer and Buddhist teachings. The ideological movement however has gained major influence over the Cambodian Parliament in which now the current king becomes concerned with its power. He keeps them and the young Sihanouk in check by balancing the Sangkum's power with those of his own, and parties that oppose the Sangkum within the Parliament."
 CAM_military_influence_balanced:0 "Military Influence: §GBalanced§!"
CAM_military_influence_balanced:0 "The military itself provides a vital role in th countries external and internal security. In recent years Lon Nol has been able to rise the ranks and control the military. They worry comes from his ambitious nature and ultra nationalist stance. The monarch uses his armed forces to crush decent whilst also trying to limit military power in government affairs. This becomes another one of the kingdom's tight ropes that needs to be in perfect balance."
