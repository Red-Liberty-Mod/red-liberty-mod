 POLITICS_MICHAEL_COLLINS_DESC:0 "Regarded by many as a traitor to Ireland but by more as the undisputed founder of the Irish Republic, Michael Collins is a divisive man. As a young man and former accountant, Mick joined the Irish Volunteers in 1913, and would serve as a soldier of the Provisional Irish Republic during the Easter Rising just three years later. He was known for his tactical mind and fiery patriotism, for both of which he became a close friend and confidant to Seán MacDiarmada in the years after the failed Rising. Following the death of MacDiarmada in 1918, Collins was not only the man to proclaim the First Dáil and to assume a position as the President of the new Irish Republic, but was one of the revolution’s greatest military minds, revolutionising guerrilla warfare, infiltrating the British Intelligence Service, and ultimately being called to negotiate for the independence of Ireland in 1920 as the Great War was finally nearing its end.\n\nHoping to avoid any further instability for the new Republic, Collins won for 26 counties complete independence, but ceded 6 of the most militantly Protestant counties in Ulster to the UK, ironically causing the Irish Civil War while the Republic was still in its infancy. In the aftermath, political opponents of Collins and sympathisers with ICA and IRA rebels found themselves all but completely excluded from the Dáil, and commonly discriminated against by law. In the end, The Big Fella emerged from the Revolutionary Period of Irish history with a stranglehold on the new Irish government, And is now nearing the end of his second term as Taoiseach, widely expected to gain a third."
 
 IRE_anglo_irish_trade_war:0 "Anglo-Irish Trade War"
 IRE_anglo_irish_trade_war_desc:0 "Taking the form of unilateral trade restrictions and outrageous tariffs between Ireland and Britain, the Irish economy and the livelihoods of its people have suffered much from the Trade War. The restrictions themselves considered the result of Na Chéad Laochra’s protectionist economic policy and the refusal of the Irish government to reimburse Britain for loans granted to tenant farmers prior to the establishment of the Irish Republic, the worst sufferers of the Trade War are ironically the same farmers which Collins’ party sought to protect."
 IRE_anglo_irish_trade_war_1:0 "Anglo-Irish Trade War"
 IRE_anglo_irish_trade_war_1_desc:0 "Taking the form of unilateral trade restrictions and outrageous tariffs between Ireland and Britain, the Irish economy and the livelihoods of its people have suffered much from the Trade War. The restrictions themselves considered the result of Na Chéad Laochra’s protectionist economic policy and the refusal of the Irish government to reimburse Britain for loans granted to tenant farmers prior to the establishment of the Irish Republic, the worst sufferers of the Trade War are ironically the same farmers which Collins’ party sought to protect."
 IRE_paramilitary_violence:0 "Paramilitary Violence"
 IRE_paramilitary_violence_desc:0 "Often excluded from government or prevented by the widespread restrictions imposed by the Irish government from legally participating in political functions, many radical young men have taken to joining illegal paramilitary organisations instead. Whether these groups be holdovers from the Revolutionary Years of Irish history just a few decades ago or entirely new factions formed in response to Collins’ government, they have become known for their vigilante justice and shows of force on both sides of the Irish border. Revolutionary violence has increased in recent years as a result of many Socialist and hardline Nationalist leaders being released from their long sentences for taking part in the Civil War just 13 years ago."
 IRE_ireland_divided:0 "Ireland Divided"
 IRE_ireland_divided_desc:0 "With a border dividing the country in two, infighting in both the North and South, and resentment seeming to grow by the day between every faction of political thought, the Irish Republic is facing a mounting crisis of internal division caused largely by the inflexibility of the current government and the wounds of the Civil War. However it may happen, one thing is clear; If Ireland is to survive, it must have unity."
 
 IRE_parliament:0 "Dáil Éireann"
 IRE_parliament_desc:0 "The Dáil Éireann serves as the directly elected lower house of the Oireachtas of the Irish State.\n\n§hCommunist Party§!: [?communist_tds]\n§rCóisir na nDaoine§!: [?rev_socialist_tds]\n§RIrish Worker League§!: [?socialist_tds]\n§PPáirtí an Lucht Oibre§!: [?labour_tds]\n§CDíle Saor§!: [?liberal_tds]\n§YNa Chéad Laochra§!: [?conservative_tds]\n§gSinn Féin§!: [?authoritarian_tds]"
 
 ### EVENTS ###
 
 ireland.2.title:0 "Cathal Brugha Released from Prison"
 ireland.2.desc:0 "Cathal Brugha, hero of the War of Independence and Easter Rising, first Ceann Comhairle of Dáil Éireann, and former Chief of Staff of the Irish Republican Army, has finally been released from his long stay in Mountjoy Prison following his arrest in November of 1924 in connection with the Civil War half a year prior. On his release, Brugha was met by a crowd of ardent supporters and made a small speech thanking those gathered for their concern, but thereafter quickly left the scene. Ever the restrained revolutionary, it is unknown what role Brugha might play in the mounting division of Ireland, and some debate whether he’ll play a role at all, but the same government which locked him up years ago is certainly keeping a close eye on this hero of the people."
 ireland.2.a:0 "'God save Ireland, said the heroes...'"
 
